<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>设置 · 塔罗字卡</title>
    <style>
        /* ========== 基础样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
        }
        #settingsApp {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 90vh;
        }
        .settings-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        .settings-header h2 {
            font-size: 20px;
            font-weight: 600;
            flex: 1;
            text-align: center;
            margin: 0;
        }
        .settings-tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
            overflow-x: auto;
        }
        .settings-tabs button {
            flex: 1;
            padding: 12px 4px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            font-weight: 500;
        }
        .settings-tabs button.active {
            color: #000;
            border-bottom-color: #07c160;
            font-weight: 600;
        }
        .settings-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px 30px;
            background: #fafafa;
        }
        .settings-subpanel {
            display: none;
        }
        .settings-subpanel.active {
            display: block;
        }

        /* ========== 通用组件 ========== */
        .btn-primary {
            background: #07c160;
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover { background: #06ad56; }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-danger:hover { background: #c0392b; }
        .btn-outline {
            background: transparent;
            border: 1px solid #ccc;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline:hover { background: #f0f0f0; }

        .batch-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .batch-actions button {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
        }
        .batch-actions button.primary {
            border-color: #07c160;
            color: #07c160;
        }
        .batch-actions button.danger {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .card-list-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            background: #fff;
            border-radius: 6px;
            margin-bottom: 6px;
            border: 1px solid #eee;
            gap: 8px;
        }
        .card-list-item .content {
            flex: 1;
            word-break: break-word;
            font-size: 14px;
        }
        .card-list-item .group-tag {
            font-size: 11px;
            color: #888;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .card-list-item .del-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
        }
        .card-list-item .checkbox {
            margin-right: 6px;
        }

        /* 信件 */
        .letter-item {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #07c160;
        }
        .letter-item .letter-meta {
            font-size: 12px;
            color: #888;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .letter-item .letter-content {
            margin: 6px 0;
        }
        .letter-item .letter-result {
            background: #f5f5f5;
            padding: 8px;
            border-radius: 4px;
            font-size: 14px;
            margin-top: 4px;
        }
        .letter-item .status-badge {
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 12px;
            background: #f0f0f0;
        }
        .letter-item .status-badge.done {
            background: #d4edda;
            color: #155724;
        }
        .letter-item .status-badge.waiting {
            background: #fff3cd;
            color: #856404;
        }

        /* 小六卦起 */
        .liuyao-input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }
        .liuyao-input-area input,
        .liuyao-input-area textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
        }
        .liuyao-input-area textarea {
            min-height: 60px;
            resize: vertical;
        }
        .liuyao-result {
            background: #fff;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            border: 1px solid #eee;
            white-space: pre-wrap;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: #fff;
            border-radius: 4px;
            margin-bottom: 4px;
            cursor: pointer;
            border: 1px solid #f0f0f0;
        }
        .history-item .del-hist {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 16px;
        }

        /* 弹窗 (模态框) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            backdrop-filter: blur(2px);
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            padding: 24px 22px 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalIn 0.25s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal h3 {
            font-size: 18px;
            margin-bottom: 16px;
            text-align: center;
            color: #1a1a1a;
        }
        .modal .field {
            margin-bottom: 16px;
        }
        .modal .field label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }
        .modal .field input[type="text"],
        .modal .field input[type="file"],
        .modal .field textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            font-family: inherit;
        }
        .modal .field input:focus,
        .modal .field textarea:focus {
            border-color: #07c160;
        }
        .modal .field textarea {
            resize: vertical;
            min-height: 80px;
        }
        .modal .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            justify-content: flex-end;
        }
        .modal .btn-row button {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
        .modal .btn-row .btn-cancel {
            background: #f0f0f0;
            color: #666;
        }
        .modal .btn-row .btn-cancel:hover {
            background: #e0e0e0;
        }
        .modal .btn-row .btn-confirm {
            background: #07c160;
            color: #fff;
        }
        .modal .btn-row .btn-confirm:hover {
            background: #06ad56;
        }

        /* 提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 9999;
            display: none;
        }
        .toast.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        hr {
            margin: 16px 0;
            border: none;
            border-top: 1px solid #eee;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mt-8 { margin-top: 8px; }
        .mb-8 { margin-bottom: 8px; }
        .text-center { text-align: center; }
        .text-muted { color: #888; font-size: 13px; }

        /* 主题风格预览 */
        .theme-preview-box {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            border: 1px solid #ddd;
        }
        .theme-preview-box .preview-msg {
            background: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            margin: 4px 0;
            display: inline-block;
        }
    </style>
</head>
<body>

<div id="settingsApp">
    <!-- 头部 -->
    <div class="settings-header">
        <h2>⚙️ 设置管理</h2>
    </div>

    <!-- 选项卡 -->
    <div class="settings-tabs" id="settingsTabs">
        <button class="active" data-tab="tabCustom">自定义回复</button>
        <button data-tab="tabTheme">主题风格</button>
        <button data-tab="tabLetter">信件往来</button>
        <button data-tab="tabLiuyao">小六卦起</button>
    </div>

    <!-- 内容 -->
    <div class="settings-content">
        <!-- 自定义回复 -->
        <div id="tabCustom" class="settings-subpanel active">
            <div class="batch-actions">
                <button class="primary" id="addCardBtn">➕ 添加</button>
                <button class="danger" id="batchDeleteBtn">🗑️ 批量删除</button>
                <button class="primary" id="groupManageBtn">📁 分组管理</button>
            </div>
            <div id="cardListContainer"></div>
        </div>

        <!-- 主题风格 -->
        <div id="tabTheme" class="settings-subpanel">
            <div style="display:flex;flex-direction:column;gap:10px;">
                <button class="btn-primary" id="themeBgBtn">🖼️ 主题背景</button>
                <button class="btn-primary" id="themeBubbleBtn">💬 主题字泡 (复古)</button>
                <button class="btn-primary" id="themeNightBtn">🌙 夜间模式</button>
                <button class="btn-primary" id="themeHappyBtn">😄 天天开心 (重置默认)</button>
                <div class="text-muted text-center" style="margin-top:8px;">点击切换，再次点击取消。主界面需刷新生效。</div>
            </div>
            <div class="theme-preview-box" style="margin-top:16px;">
                <div style="font-weight:600;margin-bottom:6px;">当前主题预览</div>
                <div id="themePreviewContainer">
                    <div class="preview-msg" style="background:#95ec69;align-self:flex-end;">我方消息</div>
                    <div class="preview-msg" style="background:#fff;align-self:flex-start;">对方消息</div>
                </div>
            </div>
        </div>

        <!-- 信件往来 -->
        <div id="tabLetter" class="settings-subpanel">
            <div style="display:flex;gap:10px;margin-bottom:16px;">
                <button class="btn-primary" id="letterInboxBtn">📩 来信</button>
                <button class="btn-primary" id="letterComposeBtn">✉️ 回写信</button>
            </div>
            <div id="letterContainer"></div>
        </div>

        <!-- 小六卦起 -->
        <div id="tabLiuyao" class="settings-subpanel">
            <div class="liuyao-input-area">
                <textarea id="liuyaoQuestion" placeholder="输入您的问题..."></textarea>
                <input type="text" id="liuyaoInput" placeholder="输入数字或单个汉字">
                <button class="btn-primary" id="liuyaoGetBtn">🔮 获取结果</button>
            </div>
            <div id="liuyaoResultDisplay" class="liuyao-result" style="display:none;"></div>
            <hr>
            <div class="flex-between">
                <span style="font-weight:600;">📜 历史结果</span>
                <button class="btn-danger" id="clearLiuyaoHist" style="padding:4px 12px;font-size:12px;">清空</button>
            </div>
            <div id="liuyaoHistory" style="margin-top:8px;"></div>
        </div>
    </div>
</div>

<!-- ===== 通用模态框 ===== -->
<div class="modal-overlay" id="commonModal">
    <div class="modal">
        <h3 id="commonModalTitle">标题</h3>
        <div id="commonModalBody"></div>
        <div class="btn-row" id="commonModalFooter">
            <button class="btn-cancel" id="commonModalCancel">取消</button>
            <button class="btn-confirm" id="commonModalConfirm">确定</button>
        </div>
    </div>
</div>

<!-- ===== Toast 提示 ===== -->
<div id="toast" class="toast"></div>

<script>
    // ================================================================
    //  1. 数据存储 (与 index.html 共用 localStorage)
    // ================================================================
    const CARD_STORAGE_KEY = 'tarot_custom_cards';
    const GROUP_STORAGE_KEY = 'tarot_groups';
    const LETTER_STORAGE_KEY = 'tarot_letters';
    const LIUYAO_HIST_KEY = 'tarot_liuyao_hist';
    const THEME_STORAGE_KEY = 'tarot_theme';

    // 加载数据
    function loadData(key, defaultVal) {
        try {
            const data = localStorage.getItem(key);
            if (data) return JSON.parse(data);
            return defaultVal;
        } catch (e) { return defaultVal; }
    }
    function saveData(key, val) {
        localStorage.setItem(key, JSON.stringify(val));
    }

    let customCards = loadData(CARD_STORAGE_KEY, []);
    let groups = loadData(GROUP_STORAGE_KEY, []);
    let letters = loadData(LETTER_STORAGE_KEY, []);
    let liuyaoHistory = loadData(LIUYAO_HIST_KEY, []);

    // 保存所有
    function saveAll() {
        saveData(CARD_STORAGE_KEY, customCards);
        saveData(GROUP_STORAGE_KEY, groups);
        saveData(LETTER_STORAGE_KEY, letters);
        saveData(LIUYAO_HIST_KEY, liuyaoHistory);
    }

    // ================================================================
    //  2. 辅助函数
    // ================================================================
    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(el._timeout);
        el._timeout = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function openModal(title, bodyHTML, confirmText = '确定', cancelText = '取消', onConfirm) {
        const modal = document.getElementById('commonModal');
        document.getElementById('commonModalTitle').textContent = title;
        document.getElementById('commonModalBody').innerHTML = bodyHTML;
        document.getElementById('commonModalFooter').style.display = 'flex';
        const confirmBtn = document.getElementById('commonModalConfirm');
        const cancelBtn = document.getElementById('commonModalCancel');
        confirmBtn.textContent = confirmText;
        cancelBtn.textContent = cancelText;
        modal.classList.add('active');
        // 移除旧监听
        const newConfirm = confirmBtn.cloneNode(true);
        confirmBtn.parentNode.replaceChild(newConfirm, confirmBtn);
        const newCancel = cancelBtn.cloneNode(true);
        cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);
        newConfirm.addEventListener('click', () => {
            if (onConfirm) onConfirm();
            modal.classList.remove('active');
        });
        newCancel.addEventListener('click', () => {
            modal.classList.remove('active');
        });
        // 点击外部关闭
        modal.onclick = (e) => {
            if (e.target === modal) modal.classList.remove('active');
        };
    }

    function closeModal() {
        document.getElementById('commonModal').classList.remove('active');
    }

    // ================================================================
    //  3. 自定义回复
    // ================================================================
    function renderCardList() {
        const container = document.getElementById('cardListContainer');
        if (!container) return;
        if (customCards.length === 0) {
            container.innerHTML = '<div class="text-muted text-center" style="padding:20px;">暂无字卡，点击“添加”创建。</div>';
            return;
        }
        // 按分组显示
        const groupsMap = {};
        customCards.forEach(c => {
            const g = c.group || '未分组';
            if (!groupsMap[g]) groupsMap[g] = [];
            groupsMap[g].push(c);
        });
        let html = '';
        for (const [groupName, cards] of Object.entries(groupsMap)) {
            html += `<div style="margin:8px 0 4px;font-weight:600;color:#555;">📁 ${groupName}</div>`;
            cards.forEach(c => {
                html += `
                    <div class="card-list-item" data-id="${c.id}">
                        <input type="checkbox" class="card-checkbox" data-id="${c.id}">
                        <span class="content">${c.content}</span>
                        <span class="group-tag">${c.group || '未分组'}</span>
                        <button class="del-btn" data-id="${c.id}">✕</button>
                    </div>
                `;
            });
        }
        container.innerHTML = html;
        // 绑定删除
        container.querySelectorAll('.del-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                if (confirm('删除该字卡？')) {
                    customCards = customCards.filter(c => c.id !== id);
                    saveAll();
                    renderCardList();
                    showToast('已删除');
                }
            });
        });
    }

    // 添加字卡
    function showAddCardModal() {
        openModal('添加字卡 (一行一条)', `
            <div class="field">
                <label>内容 (每行一条，自动拆分)</label>
                <textarea id="addCardTextarea" placeholder="输入多行字卡内容..."></textarea>
            </div>
            <div class="field">
                <label>分组 (可选)</label>
                <input type="text" id="addCardGroup" placeholder="分组名称">
            </div>
        `, '添加', '取消', () => {
            const textarea = document.getElementById('addCardTextarea');
            const group = document.getElementById('addCardGroup').value.trim() || '未分组';
            const lines = textarea.value.split('\n').map(s => s.trim()).filter(s => s.length > 0);
            if (lines.length === 0) {
                showToast('请输入至少一条内容');
                return;
            }
            lines.forEach(content => {
                customCards.push({ id: Date.now() + Math.random() * 1000, content, group });
            });
            saveAll();
            renderCardList();
            showToast(`成功添加 ${lines.length} 条字卡`);
        });
    }

    // 批量删除
    function batchDelete() {
        const checks = document.querySelectorAll('.card-checkbox:checked');
        if (checks.length === 0) {
            showToast('请先勾选要删除的字卡');
            return;
        }
        if (!confirm(`确定删除选中的 ${checks.length} 条字卡吗？`)) return;
        const ids = Array.from(checks).map(cb => parseInt(cb.dataset.id));
        customCards = customCards.filter(c => !ids.includes(c.id));
        saveAll();
        renderCardList();
        showToast(`已删除 ${ids.length} 条`);
    }

    // 分组管理
    function showGroupManage() {
        let html = `<div class="field"><label>现有分组</label><div style="max-height:200px;overflow-y:auto;">`;
        const groupSet = new Set(customCards.map(c => c.group || '未分组'));
        if (groupSet.size === 0) html += '<div class="text-muted">暂无分组</div>';
        else {
            groupSet.forEach(g => {
                html += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0;">
                    <span>${g}</span>
                    <button class="del-btn" data-group="${g}" style="color:#e74c3c;background:none;border:none;cursor:pointer;">✕</button>
                </div>`;
            });
        }
        html += `</div></div>
            <div class="field"><label>新建分组</label><input type="text" id="newGroupName" placeholder="输入新分组名称"></div>
            <div class="field"><label>将选中的字卡移到分组</label>
                <select id="moveGroupSelect"><option value="">-- 不移动 --</option>`;
        groupSet.forEach(g => {
            html += `<option value="${g}">${g}</option>`;
        });
        html += `</select></div>`;
        openModal('分组管理', html, '应用', '关闭', () => {
            const newGroup = document.getElementById('newGroupName').value.trim();
            if (newGroup) {
                // 创建新分组（不需要额外存储，只需在卡片中更新）
                showToast(`分组 "${newGroup}" 已创建，可在添加时使用`);
            }
            const moveTo = document.getElementById('moveGroupSelect').value;
            if (moveTo) {
                // 选中所有未分组的卡片移到该组？或者用户自行在列表修改，这里简化
                showToast('请在列表内手动修改分组 (点击卡片内容可编辑)');
            }
            // 实际上我们提供更直接的方式：点击卡片内容可编辑
            // 简单起见，仅提示
        });
        // 删除分组：实际上我们需要将属于该分组的卡片移到未分组或删除
        // 使用事件委托
        setTimeout(() => {
            document.querySelectorAll('#commonModalBody .del-btn[data-group]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const g = btn.dataset.group;
                    if (confirm(`删除分组 "${g}" 及其所有字卡？`)) {
                        customCards = customCards.filter(c => c.group !== g);
                        saveAll();
                        renderCardList();
                        showToast(`已删除分组 "${g}"`);
                        closeModal();
                    }
                });
            });
        }, 100);
    }

    // ================================================================
    //  4. 主题风格 (存储到 localStorage)
    // ================================================================
    function getTheme() {
        return loadData(THEME_STORAGE_KEY, {});
    }
    function setTheme(themeObj) {
        const current = getTheme();
        Object.assign(current, themeObj);
        saveData(THEME_STORAGE_KEY, current);

    function liuyaoCalc(input, question) {
        const num = parseInt(input);
        if (!isNaN(num)) {
            const idx = ((num - 1) % 6 + 6) % 6;
            const results = ['大安', '留连', '速喜', '赤口', '小吉', '空亡'];
            const meanings = {
                '大安': '身不动时，五行属木，颜色青色，方位东方。临青龙，凡谋事主一、五、七。有静止、心安、吉祥之含义。',
                '留连': '卒未归时，五行属水，颜色黑色，方位北方。临玄武，凡谋事主二、八、十。有暗昧不明、延迟、纠缠、拖延之含义。',
                '速喜': '人即至时，五行属火，颜色红色，方位南方。临朱雀，凡谋事主三、六、九。有快速、喜庆、吉利之含义。指时机已到。',
                '赤口': '官事凶时，五行属金，颜色白色，方位西方。临白虎，凡谋事主四、七、十。有不吉、惊恐、凶险、口舌是非之含义。',
                '小吉': '人来喜时，五行属水，临六合，凡谋事主一、五、七。有和合、吉利之含义。',
                '空亡': '音信稀时，五行属土，颜色黄色，方位中央。临勾陈，凡谋事主三、六、九。有不吉、无结果、忧虑之含义。'
            };
            return `🔮 小六壬掌诀：${results[idx]}\n${meanings[results[idx]] || ''}`;
        } else if (input.length === 1) {
            const char = input;
            const dict = {
                '一':'一心一意，专注当下。','二':'二元对立，选择与平衡。','三':'三生万物，生生不息。',
                '四':'四方安稳，脚踏实地。','五':'五行调和，中庸之道。','六':'六合顺遂，人际和谐。',
                '七':'七情六欲，修心为上。','八':'八方来财，机遇增多。','九':'九九归一，圆满结局。',
                '十':'十全十美，完美收官。','水':'水性流动，柔韧包容。','火':'火性热烈，光明上进。',
                '木':'木性生发，成长壮大。','金':'金性刚毅，果断决绝。','土':'土性厚重，承载万物。',
                '天':'天道酬勤，自强不息。','地':'地道坤顺，厚德载物。','人':'人和为贵，众志成城。',
                '心':'心之所向，素履以往。','爱':'爱出者爱返，福往者福来。'
            };
            if (dict[char]) return `📜 字解：「${char}」\n${dict[char]}`;
            else {
                const strokes = ['横','竖','撇','捺','折'];
                const pick = strokes[Math.floor(Math.random() * strokes.length)];
                return `📜 字解：「${char}」\n此字笔画含「${pick}」，寓意${pick}者，通达也。`;
            }
        } else {
            return '请输入数字或单个汉字。';
        }
    }

        const question = document.getElementById('liuyaoQuestion').value.trim();
        const input = document.getElementById('liuyaoInput').value.trim();

        display.innerHTML = `<strong>结果：</strong><pre style="white-space:pre-wrap;margin-top:6px;">${result}</pre>`;
        // 保存历史

            id: Date.now() + Math.random(),

            result: result,
            time: new Date().toLocaleString()
        });

        const container = document.getElementById('liuyaoHistory');
        if (!container) return;
        if (liuyaoHistory.length === 0) {
            container.innerHTML = '<div class="text-muted text-center" style="padding:10px;">暂无历史记录</div>';
            return;
        }
        let html = '';
        liuyaoHistory.slice().reverse().forEach(h => {
            html += `
                <div class="history-item" data-id="${h.id}">
                    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${h.question || h.input} → ${h.result.slice(0,20)}...</span>

                const id = parseInt(item.dataset.id);

    // ================================================================
    //  7. 塔罗算法 (与主界面保持一致)
    // ================================================================
    function generateTarotReply(question) {
        // 从完整牌组抽牌，同时检查自定义回复
        const custom = getCustomReply();
        if (custom) {
            return { fullText: `🔮 灵讯：${custom}`, cardName: '自定义', orientation: '' };
        }
        const deck = buildFullDeck();
        const { card, isUpright } = drawCard(deck);
        const meaning = isUpright ? card.meaning : getReverseMeaning(card);
        const orientation = isUpright ? '正位' : '逆位';
        let prefix = '🌟 灵讯指引：';
        if (question.includes('感情') || question.includes('爱情')) prefix = '💕 感情方面：';
        else if (question.includes('事业') || question.includes('工作')) prefix = '💼 事业方面：';
        else if (question.includes('健康')) prefix = '🌿 健康方面：';
        else if (question.includes('财运')) prefix = '💰 财运方面：';
        let fullText = `${prefix}\n「${card.name}」${orientation}\n💬 ${meaning}`;
        const extra = ['✨ 信任你的直觉，宇宙自有安排。', '🌙 此刻的静默，是下一个回响的前奏。', '🌞 光与影交织，方见真相。',
            '🌸 一切发生，皆为助缘。', '🌀 允许变化流动，不执不拒。', '🌟 你比想象中更强大。'];
        fullText += `\n\n${extra[Math.floor(Math.random() * extra.length)]}`;
        return { fullText, cardName: card.name, orientation };
    }

    function drawCard(deck) {
        const shuffled = [...deck];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return { card: shuffled[0], isUpright: Math.random() < 0.5 };
    }

    function getReverseMeaning(card) {
        if (card.reverse) return card.reverse;
        const m = card.meaning || '';
        const prefixes = ['过度', '不足', '阻碍', '扭曲', '失衡的'];
        const p = prefixes[Math.floor(Math.random() * prefixes.length)];
        return `${p}${m.slice(0, 12)}...`;
    }

    function getCustomReply() {
        if (customCards.length === 0) return null;
        const idx = Math.floor(Math.random() * customCards.length);
        return customCards[idx].content;
    }

            tabTheme: document.getElementById('tabTheme'),
            tabLetter: document.getElementById('tabLetter'),
            tabLiuyao: document.getElementById('tabLiuyao')
        };
        tabs.forEach(btn => {
            btn.addEventListener('click', function() {
                tabs.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                Object.keys(panels).forEach(key => {
                    panels[key].classList.toggle('active', key === this.dataset.tab);
                });
            });
        });

        // 自定义回复
        document.getElementById('addCardBtn').addEventListener('click', showAddCardModal);
        document.getElementById('batchDeleteBtn').addEventListener('click', batchDelete);
        document.getElementById('groupManageBtn').addEventListener('click', showGroupManage);
        renderCardList();

        // 主题风格
        document.getElementById('themeBgBtn').addEventListener('click', () => {
            // 背景上传
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const dataUrl = ev.target.result;
                        setTheme({ bgImage: dataUrl });
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        });
        document.getElementById('themeBubbleBtn').addEventListener('click', () => {
            const current = getTheme();
            setTheme({ retro: !current.retro });
        });
        document.getElementById('themeNightBtn').addEventListener('click', () => {
            const current = getTheme();
            setTheme({ night: !current.night });
        });
        document.getElementById('themeHappyBtn').addEventListener('click', () => {
            saveData(THEME_STORAGE_KEY, {});
            showToast('已重置默认主题');
            updatePreview();
        });
        updatePreview();

        // 信件往来
        document.getElementById('letterInboxBtn').addEventListener('click', () => {
            // 刷新显示
            renderLetters();
        });
        document.getElementById('letterComposeBtn').addEventListener('click', composeLetter);
        renderLetters();

        // 小六卦起
        document.getElementById('liuyaoGetBtn').addEventListener('click', getLiuyaoResult);
        document.getElementById('clearLiuyaoHist').addEventListener('click', () => {
            if (confirm('清空所有历史记录？')) {
                liuyaoHistory = [];
                saveAll();
                renderLiuyaoHistory();
                showToast('已清空');
            }
        });
        renderLiuyaoHistory();

        // 回车触发
        document.getElementById('liuyaoInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') getLiuyaoResult();
        });
    });
</script>

</body>
  </html>
