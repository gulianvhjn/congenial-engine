<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>传讯 · 梦角</title>
    <style>
        /* ===== 全局重置 & 变量 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f5edea;
            --chat-bg: #fdf8f6;
            --bubble-user: #d9b8b0;
            --bubble-user-text: #3d2c2c;
            --bubble-bot: #ffffff;
            --bubble-bot-text: #3d2c2c;
            --bubble-radius: 20px;
            --font-size: 15px;
            --primary: #b48b8b;
            --primary-dark: #8d6b6b;
            --shadow: 0 4px 20px rgba(120, 80, 80, 0.08);
            --radius: 20px;
            --font: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', system-ui, -apple-system, sans-serif;
            --nav-height: 62px;
            --header-height: 56px;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: #3d2c2c;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-size: var(--font-size);
            transition: background 0.3s;
        }

        /* ===== 顶部导航 ===== */
        .app-header {
            flex-shrink: 0;
            background: rgba(245, 237, 234, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(180, 140, 140, 0.15);
            height: var(--header-height);
            z-index: 10;
        }

        .app-header .title {
            font-size: 17px;
            font-weight: 600;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .app-header .title span {
            background: linear-gradient(135deg, #b48b8b, #8d6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 4px;
        }
        .header-actions button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--primary-dark);
            padding: 4px 6px;
            border-radius: 10px;
            transition: 0.2s;
        }
        .header-actions button:active {
            background: rgba(180, 140, 140, 0.15);
            transform: scale(0.88);
        }

        /* ===== 页面容器 ===== */
        .page-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .page {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            background: var(--chat-bg);
            overflow-y: auto;
            padding: 0 14px 12px;
            animation: fadeSlide 0.3s ease;
            transition: background 0.3s;
        }
        .page.active {
            display: flex;
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== 聊天头部（头像+昵称） ===== */
        .chat-header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 4px 10px;
            border-bottom: 1px solid rgba(180, 140, 140, 0.10);
            gap: 8px;
            flex-wrap: wrap;
        }

        .chat-header .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 10px 4px 4px;
            border-radius: 30px;
            transition: 0.2s;
        }
        .chat-header .user-info:active {
            background: rgba(180, 140, 140, 0.08);
        }

        .chat-header .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(180, 140, 140, 0.2);
            background: #e8ddd8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .chat-header .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header .name-tag {
            font-weight: 600;
            font-size: 15px;
            color: var(--primary-dark);
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .chat-header .name-tag small {
            font-weight: 400;
            font-size: 11px;
            color: #a08888;
            display: block;
            margin-top: -2px;
        }

        .chat-header .status-dot-mini {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 2px;
            flex-shrink: 0;
        }
        .chat-header .status-dot-mini.online { background: #4caf50; }
        .chat-header .status-dot-mini.thinking { background: #ff9800; }

        .chat-header .vs {
            color: #c0a8a8;
            font-size: 12px;
            font-weight: 300;
        }

        /* ===== 聊天消息 ===== */
        #page-chat {
            padding: 0 14px 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px 0 8px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.02);
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(180, 140, 140, 0.3);
            border-radius: 8px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 88%;
            animation: fadeInMsg 0.3s ease;
        }
        @keyframes fadeInMsg {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }
        .message.bot {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message .bubble {
            padding: 10px 16px;
            border-radius: var(--bubble-radius);
            font-size: var(--font-size);
            line-height: 1.6;
            word-break: break-word;
            box-shadow: var(--shadow);
            position: relative;
            transition: background 0.3s, color 0.3s, border-radius 0.3s;
        }
        .message.user .bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            border-bottom-right-radius: 6px;
        }
        .message.bot .bubble {
            background: var(--bubble-bot);
            color: var(--bubble-bot-text);
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(200, 170, 170, 0.15);
        }

        .message .meta {
            font-size: 10px;
            color: #b0a0a0;
            margin-top: 4px;
            padding: 0 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .message.user .meta {
            justify-content: flex-end;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 10px 16px;
            background: var(--bubble-bot);
            border-radius: var(--bubble-radius);
            border-bottom-left-radius: 6px;
            box-shadow: var(--shadow);
            font-size: var(--font-size);
            color: #a08888;
            gap: 4px;
            align-items: center;
            border: 1px solid rgba(200, 170, 170, 0.15);
        }
        .typing-indicator .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #b48b8b;
            border-radius: 50%;
            animation: dotBounce 1.4s infinite;
        }
        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ===== 输入区域 ===== */
        .input-wrapper {
            flex-shrink: 0;
            background: rgba(245, 237, 234, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 6px 12px 12px;
            border-top: 1px solid rgba(180, 140, 140, 0.15);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .input-wrapper .input-row {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #fff;
            border-radius: 30px;
            padding: 2px 4px 2px 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            font-size: var(--font-size);
            padding: 8px 0;
            background: transparent;
            font-family: var(--font);
            color: #3d2c2c;
            min-width: 0;
        }
        .input-wrapper input::placeholder {
            color: #b0a0a0;
        }
        .input-wrapper .btn-icon {
            background: none;
            border: none;
            font-size: 19px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 50%;
            transition: 0.2s;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
        }
        .input-wrapper .btn-icon:active {
            background: rgba(180, 140, 140, 0.15);
            transform: scale(0.88);
        }
        .input-wrapper .btn-send {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 0 16px;
            height: 36px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .input-wrapper .btn-send:active {
            transform: scale(0.92);
            opacity: 0.8;
        }
        .input-toolbar {
            display: flex;
            gap: 4px;
            padding: 0 2px;
            flex-wrap: wrap;
        }
        .input-toolbar .quick-emoji {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(180, 140, 140, 0.12);
            border-radius: 30px;
            padding: 1px 10px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1.8;
        }
        .input-toolbar .quick-emoji:active {
            transform: scale(0.92);
            background: rgba(180, 140, 140, 0.15);
        }

        /* ===== 字卡库 ===== */
        #page-cards {
            padding: 12px 14px;
        }
        .page-header-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .page-header-actions textarea {
            flex: 1;
            min-width: 160px;
            border: 1px solid rgba(180, 140, 140, 0.2);
            border-radius: 16px;
            padding: 8px 14px;
            font-size: 13px;
            outline: none;
            font-family: var(--font);
            background: rgba(255, 255, 255, 0.6);
            resize: vertical;
            min-height: 60px;
            max-height: 120px;
        }
        .page-header-actions select {
            border: 1px solid rgba(180, 140, 140, 0.2);
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 12px;
            outline: none;
            font-family: var(--font);
            background: rgba(255, 255, 255, 0.6);
            color: var(--text);
        }
        .page-header-actions .add-btn-small {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 12px;
            cursor: pointer;
            font-family: var(--font);
            white-space: nowrap;
        }
        .page-header-actions .add-btn-small:active { transform: scale(0.94); }

        .card-filter {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .card-filter button {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(180, 140, 140, 0.2);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #7a5e5e;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font);
        }
        .card-filter button.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .card-filter button:active { transform: scale(0.94); }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            padding-bottom: 16px;
        }
        .card-item {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            border-radius: var(--radius-sm);
            padding: 10px 8px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
            font-size: 13px;
            line-height: 1.4;
            color: #3d2c2c;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: relative;
        }
        .card-item .tag {
            font-size: 10px;
            color: #a08888;
            background: rgba(180, 140, 140, 0.1);
            padding: 1px 10px;
            border-radius: 30px;
        }
        .card-item .card-actions {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }
        .card-item .card-actions button {
            background: rgba(180, 140, 140, 0.1);
            border: none;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 11px;
            color: var(--primary-dark);
            cursor: pointer;
            transition: 0.2s;
        }
        .card-item .card-actions button:active {
            transform: scale(0.92);
            background: rgba(180, 140, 140, 0.25);
        }
        .card-item .del-btn { color: #d32f2f !important; }

        /* ===== 表情库 ===== */
        #page-emojis {
            padding: 12px 14px;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
            gap: 8px;
            padding-bottom: 16px;
        }
        .emoji-item {
            background: rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-sm);
            padding: 8px 4px;
            text-align: center;
            font-size: 26px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .emoji-item:active { transform: scale(0.92); }
        .emoji-item .emoji-del {
            position: absolute;
            top: 1px;
            right: 3px;
            font-size: 11px;
            color: #d32f2f;
            background: rgba(255,255,255,0.7);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            opacity: 0;
            transition: 0.2s;
        }
        .emoji-item:hover .emoji-del { opacity: 1; }
        .emoji-item .emoji-del:active { transform: scale(0.85); }

        .emoji-add-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .emoji-add-row input {
            flex: 1;
            min-width: 100px;
            border: 1px solid rgba(180, 140, 140, 0.2);
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 14px;
            outline: none;
            font-family: var(--font);
            background: rgba(255, 255, 255, 0.6);
        }
        .emoji-add-row button {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 6px 18px;
            font-size: 13px;
            cursor: pointer;
            font-family: var(--font);
            white-space: nowrap;
        }
        .emoji-add-row button:active { transform: scale(0.94); }

        /* ===== 占卜（入口，但塔罗隐藏） ===== */
        #page-tarot {
            padding: 16px 14px;
            align-items: center;
            gap: 14px;
        }
        .tarot-spread {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tarot-spread button {
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid transparent;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #7a5e5e;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font);
        }
        .tarot-spread button.active {
            border-color: var(--primary);
            color: var(--primary-dark);
            background: rgba(180, 140, 140, 0.08);
        }
        .tarot-draw-btn {
            background: linear-gradient(135deg, #b48b8b, #8d6b6b);
            border: none;
            padding: 12px 40px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(180, 140, 140, 0.3);
            transition: 0.2s;
            font-family: var(--font);
        }
        .tarot-draw-btn:active { transform: scale(0.94); }

        /* ===== 历史 ===== */
        #page-history {
            padding: 12px 14px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 16px;
        }
        .history-item {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.2s;
        }
        .history-item:active { transform: scale(0.98); }
        .history-item .h-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #a08888;
            margin-bottom: 4px;
        }
        .history-item .h-preview {
            font-size: var(--font-size);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #3d2c2c;
        }
        .history-item .h-tag {
            display: inline-block;
            font-size: 10px;
            background: rgba(180, 140, 140, 0.1);
            padding: 2px 10px;
            border-radius: 30px;
            color: #7a5e5e;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a08888;
            font-size: 14px;
        }
        .empty-state .icon {
            font-size: 44px;
            margin-bottom: 10px;
            opacity: 0.6;
        }

        /* ===== 底部导航 ===== */
        .bottom-nav {
            flex-shrink: 0;
            background: rgba(245, 237, 234, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(180, 140, 140, 0.15);
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: var(--nav-height);
            padding-bottom: env(safe-area-inset-bottom, 4px);
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            background: none;
            border: none;
            font-size: 10px;
            color: #a08888;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 16px;
            transition: 0.2s;
            font-family: var(--font);
            position: relative;
            min-width: 44px;
        }
        .bottom-nav .nav-item .icon { font-size: 20px; line-height: 1.2; }
        .bottom-nav .nav-item .label {
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .bottom-nav .nav-item.active {
            color: var(--primary-dark);
        }
        .bottom-nav .nav-item.active::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--primary);
            border-radius: 4px;
        }
        .bottom-nav .nav-item:active { transform: scale(0.92); }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #fffaf8;
            border-radius: var(--radius);
            max-width: 400px;
            width: 100%;
            padding: 22px 18px 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .modal-box .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 12px;
            text-align: center;
        }
        .modal-box .modal-body { font-size: 14px; line-height: 1.7; color: #3d2c2c; }
        .modal-box .modal-close {
            display: block;
            margin: 16px auto 0;
            background: var(--primary);
            border: none;
            padding: 10px 36px;
            border-radius: 40px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            font-family: var(--font);
            transition: 0.2s;
        }
        .modal-box .modal-close:active { transform: scale(0.94); }

        /* ===== 外观设置面板 ===== */
        .appearance-settings {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 4px 0;
        }
        .appearance-settings .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .appearance-settings .setting-item label {
            font-weight: 500;
            color: var(--text);
            min-width: 80px;
            font-size: 14px;
        }
        .appearance-settings .setting-item input[type="color"] {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: none;
        }
        .appearance-settings .setting-item input[type="range"] {
            flex: 1;
            min-width: 100px;
            accent-color: var(--primary);
        }
        .appearance-settings .setting-item .value-display {
            font-size: 13px;
            color: var(--primary-dark);
            min-width: 30px;
            text-align: center;
        }
        .appearance-settings .preset-colors {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .appearance-settings .preset-colors .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .appearance-settings .preset-colors .color-swatch.active {
            border-color: var(--primary-dark);
            transform: scale(1.1);
        }
        .appearance-settings .preset-colors .color-swatch:active { transform: scale(0.9); }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(60, 44, 44, 0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getRandomItems(arr, count) {
            const shuffled = shuffleArray([...arr]);
            return shuffled.slice(0, Math.min(count, shuffled.length));
        }

        function drawTarotCards(count) {
            const shuffled = shuffleArray([...TAROT_CARDS]);
            return shuffled.slice(0, Math.min(count, shuffled.length)).map(c => ({
                ...c,
                reversed: Math.random() < 0.4,
            }));
        }

        function generateLoverReply(userMessage, drawnCards) {
            let matchedKey = '默认';
            for (const [pattern, templates] of Object.entries(LOVER_RESPONSES)) {
                if (pattern === '默认') continue;
                const regex = new RegExp(pattern, 'i');
                if (regex.test(userMessage)) { matchedKey = pattern; break; }
            }
            const templates = LOVER_RESPONSES[matchedKey] || LOVER_RESPONSES['默认'];
            let reply = templates[Math.floor(Math.random() * templates.length)];

            if (drawnCards && drawnCards.length > 0) {
                const card = drawnCards[0];
                const meaning = card.reversed ? card.reversed : card.upright;
                const keywords = card.keywords.slice(0, 2).join('和');
                const fuse = [
                    `有时候，${keywords}就是我们需要的答案。`,
                    `你知道吗，${keywords}的力量就在你心里。`,
                    `我觉得，${keywords}会指引我们找到方向。`,
                    `${keywords}，这就是我今天想对你说的。`,
                    `生活就像${card.name}，充满了${keywords}的魔力。`
                ];
                const fused = fuse[Math.floor(Math.random() * fuse.length)];
                if (Math.random() < 0.5) {
                    reply = fused;
                } else {
                    reply += ' ' + fused;
                }
            }

            if (Math.random() < 0.2) {
                const phrase = ROMANTIC_PHRASES[Math.floor(Math.random() * ROMANTIC_PHRASES.length)];
                reply += ' ' + phrase;
            }

            reply = reply.replace(/\n/g, ' ').trim();
            if (!/[。？！….]$/.test(reply)) reply += '。';
            return reply;
        }

                text: text,
                timestamp: Date.now(),

            state.history.push({ ...msg });
            saveState();
            renderMessages();
            scrollToBottom();

        function simulateBotReply(userText) {
            const typing = document.getElementById('typingIndicator');
            typing.style.display = 'flex';
            document.getElementById('sendBtn').disabled = true;
            updateBotStatus('thinking', '思考中...');

            setTimeout(() => {
                const count = state.spread;
                const cards = drawTarotCards(count);
                const reply = generateLoverReply(userText, cards);
                addMessage('bot', reply, {
                    tarot: {
                        cards: cards.map(c => ({ name: c.name, reversed: c.reversed })),
                        spread: count,
                    }
                });
                typing.style.display = 'none';
                document.getElementById('sendBtn').disabled = false;
                updateBotStatus('online', '在线');
            }, 800 + Math.random() * 800);
        }

            const container = document.getElementById('chatMessages');
            if (state.messages.length === 0) {
                container.innerHTML = `

                        <div>开始传讯吧</div>
                        <div style="font-size:12px;margin-top:6px;">对方会像恋人一样回应你</div>
                    </div>
                `;
                return;
            }
            let html = '';
            for (const msg of state.messages) {
                const isUser = msg.sender === 'user';
                const cls = isUser ? 'user' : 'bot';
                const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let bubbleContent = msg.text.replace(/\n/g, '<br>');
                html += `
                    <div class="message ${cls}">
                        <div class="bubble">${bubbleContent}</div>
                        <div class="meta"><span>${time}</span></div>
                    </div>
                `;
            }
            container.innerHTML = html;
            scrollToBottom();
        }

                filtered = filtered.filter(w => w.tag === filter);
            }
            document.getElementById('cardCount').textContent = `共 ${filtered.length} 张`;
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">😶 没有字卡</div>`;
                return;
            }
            const shuffled = shuffleArray([...filtered]);
            grid.innerHTML = shuffled.map((w, idx) => `
                <div class="card-item">
                    <div>${w.text}</div>
                    <span class="tag">${w.tag}</span>
                    <div class="card-actions">
                        <button onclick="addCardToChat('${w.text.replace(/'/g, "\\'")}')">➕ 发送</button>
                        <button class="del-btn" onclick="deleteCard(${idx})">✕</button>
                    </div>
                </div>
            `).join('');
        }

        // 添加字卡到输入框（自动换行）
        function addCardToChat(text) {
            const input = document.getElementById('msgInput');
            let current = input.value;
            // 如果当前内容非空且不以换行结尾，先加换行
            if (current && !current.endsWith('\n')) {
                current += '\n';
            }
            // 直接添加字卡文本（不加引号，保持简洁）
            input.value = current + text;
            input.focus();
            showToast('✅ 已添加字卡');
            switchPage('chat');
        }

        // 批量添加字卡（多行输入）
        function addNewCards() {
            const textarea = document.getElementById('newCardInput');
            const tag = document.getElementById('newCardTag').value;
            const raw = textarea.value;
            const lines = raw.split('\n').map(s => s.trim()).filter(s => s.length > 0);
            if (lines.length === 0) {
                showToast('请输入至少一行字卡内容');
                return;
            }
            let added = 0;
            for (const line of lines) {
                state.wordCards.push({ text: line, tag });
                added++;
            }
            textarea.value = '';
            saveState();
            renderCardGrid(cardFilter);
            showToast(`✅ 成功添加 ${added} 张字卡`);
        }

        function deleteCard(index) {
            if (confirm('确定删除这张字卡吗？')) {
                state.wordCards.splice(index, 1);
                saveState();
                renderCardGrid(cardFilter);
                showToast('已删除');
            }
        }

        function openCardPicker() {
            switchPage('cards');
            showToast('点击「发送」可将字卡加入输入框（自动换行）');
        }

        // ============================================================
        //  9. 表情库
        // ============================================================
        function renderEmojis() {
            const grid = document.getElementById('emojiGrid');
            document.getElementById('emojiCount').textContent = `共 ${state.emojis.length} 个`;
            if (state.emojis.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">😶 没有表情</div>`;
                return;
            }
            grid.innerHTML = state.emojis.map((e, idx) => `
                <div class="emoji-item" onclick="addEmojiToChat('${e}')">
                    ${e}
                    <button class="emoji-del" onclick="event.stopPropagation();deleteEmoji(${idx})">✕</button>
                </div>
            `).join('');
        }

        function addEmojiToChat(emoji) {
            const input = document.getElementById('msgInput');
            input.value = input.value + emoji;
            input.focus();
            showToast('✅ 已添加表情');
            switchPage('chat');
        }

        function addNewEmoji() {
            const input = document.getElementById('newEmojiInput');
            const emoji = input.value.trim();
            if (!emoji) { showToast('请输入表情符号'); return; }
            state.emojis.push(emoji);
            input.value = '';
            saveState();
            renderEmojis();
            showToast('✅ 表情已添加');
        }

        function deleteEmoji(index) {
            if (confirm('确定删除这个表情吗？')) {
                state.emojis.splice(index, 1);
                saveState();
                renderEmojis();
                showToast('已删除');
            }
        }

        function openEmojiPicker() {
            switchPage('emojis');
            showToast('点击表情可添加到输入框');
        }

        // ============================================================
        //  10. 占卜
        // ============================================================
        function performTarotDraw() {
            const count = state.spread;
            const cards = drawTarotCards(count);
            const cardNames = cards.map(c => c.name).join('、');
            showToast(`✨ 已抽牌：${cardNames}，将融入后续对话`);
            const reply = generateLoverReply('抽牌', cards);
            addMessage('bot', `✨ 我感受到了一些能量… ${reply}`, {
                tarot: {
                    cards: cards.map(c => ({ name: c.name, reversed: c.reversed })),
                    spread: count,
                }
            });
        }

        // ============================================================
        //  11. 历史
        // ============================================================
        function renderHistory() {
            const container = document.getElementById('historyList');
            if (state.history.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="icon">📜</div><div>还没有记录</div></div>`;
                return;
            }
            const items = state.history.slice(-20).reverse();
            container.innerHTML = items.map(h => {
                const date = new Date(h.timestamp).toLocaleString();
                const preview = h.text.length > 50 ? h.text.slice(0, 50) + '…' : h.text;
                const sender = h.sender === 'user' ? '我' : '对方';
                return `
                    <div class="history-item" onclick="viewHistoryDetail('${h.id}')">
                        <div class="h-header"><span>${sender}</span><span>${date}</span></div>
                        <div class="h-preview">${preview}</div>
                        ${h.tarot ? `<div class="h-tag">🔮 塔罗</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function viewHistoryDetail(id) {
            const msg = state.history.find(m => m.id === id);
            if (!msg) return;
            const body = `
                <div style="font-size:13px;color:#a08888;margin-bottom:6px;">${msg.sender === 'user' ? '我' : '对方'} · ${new Date(msg.timestamp).toLocaleString()}</div>
                <div style="background:rgba(248,240,240,0.5);padding:14px;border-radius:12px;font-size:var(--font-size);line-height:1.8;">
                    ${msg.text.replace(/\n/g, '<br>')}
                </div>
                ${msg.tarot ? `<div style="margin-top:10px;font-size:12px;color:#a08888;">🔮 塔罗：${msg.tarot.cards.map(c=>c.name).join('、')}</div>` : ''}
            `;
            document.getElementById('modalTitle').textContent = '📜 详情';
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function clearHistory() {
            if (state.history.length === 0) { showToast('没有记录'); return; }
            if (confirm('确定清空所有记录吗？')) {
                state.history = [];
                state.messages = [];
                saveState();
                renderMessages();
                renderHistory();
                showToast('已清空');
            }
        }

        function clearAllChat() {
            if (state.messages.length === 0) { showToast('聊天已空'); return; }
            if (confirm('确定清空聊天吗？（历史也会删除）')) {
                state.messages = [];
                state.history = [];
                saveState();
                renderMessages();
                renderHistory();
                showToast('已清空');
            }
        }

        // ============================================================
        //  12. 外观设置
        // ============================================================
        function openAppearance() {
            const overlay = document.getElementById('appearanceOverlay');
            overlay.classList.add('open');
            const a = state.appearance;
            document.getElementById('bgColorPicker').value = a.bgColor;
            document.getElementById('chatBgPicker').value = a.chatBgColor;
            document.getElementById('userBubbleColor').value = a.userBubbleColor;
            document.getElementById('userTextColor').value = a.userTextColor;
            document.getElementById('botBubbleColor').value = a.botBubbleColor;
            document.getElementById('botTextColor').value = a.botTextColor;
            document.getElementById('fontSizeRange').value = a.fontSize;
            document.getElementById('fontSizeDisplay').textContent = a.fontSize + 'px';
            document.getElementById('bubbleRadiusRange').value = a.bubbleRadius;
            document.getElementById('bubbleRadiusDisplay').textContent = a.bubbleRadius + 'px';
            document.querySelectorAll('#bgPresets .color-swatch').forEach(el => {
                el.classList.toggle('active', el.dataset.color === a.bgColor);
            });
            document.querySelectorAll('#chatBgPresets .color-swatch').forEach(el => {
                el.classList.toggle('active', el.dataset.color === a.chatBgColor);
            });
        }

        function closeAppearance() {
            document.getElementById('appearanceOverlay').classList.remove('open');
        }

        function applyAppearance() {
            const a = state.appearance;
            a.bgColor = document.getElementById('bgColorPicker').value;
            a.chatBgColor = document.getElementById('chatBgPicker').value;
            a.userBubbleColor = document.getElementById('userBubbleColor').value;
            a.userTextColor = document.getElementById('userTextColor').value;
            a.botBubbleColor = document.getElementById('botBubbleColor').value;
            a.botTextColor = document.getElementById('botTextColor').value;
            a.fontSize = parseInt(document.getElementById('fontSizeRange').value);
            a.bubbleRadius = parseInt(document.getElementById('bubbleRadiusRange').value);

            document.documentElement.style.setProperty('--bg', a.bgColor);
            document.documentElement.style.setProperty('--chat-bg', a.chatBgColor);
            document.documentElement.style.setProperty('--bubble-user', a.userBubbleColor);
            document.documentElement.style.setProperty('--bubble-user-text', a.userTextColor);
            document.documentElement.style.setProperty('--bubble-bot', a.botBubbleColor);
            document.documentElement.style.setProperty('--bubble-bot-text', a.botTextColor);
            document.documentElement.style.setProperty('--font-size', a.fontSize + 'px');
            document.documentElement.style.setProperty('--bubble-radius', a.bubbleRadius + 'px');

            document.querySelectorAll('.page').forEach(p => p.style.background = a.chatBgColor);
            saveState();
            showToast('✅ 外观已应用');
            closeAppearance();
        }

        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('color-swatch')) {
                const parent = e.target.closest('.preset-colors');
                const pickerId = parent.id === 'bgPresets' ? 'bgColorPicker' : 'chatBgPicker';
                const picker = document.getElementById(pickerId);
                const color = e.target.dataset.color;
                picker.value = color;
                parent.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
                e.target.classList.add('active');
                if (pickerId === 'bgColorPicker') {
                    document.documentElement.style.setProperty('--bg', color);
                } else {
                    document.documentElement.style.setProperty('--chat-bg', color);
                    document.querySelectorAll('.page').forEach(p => p.style.background = color);
                }
            }
        });

        document.getElementById('fontSizeRange').addEventListener('input', function() {
            document.getElementById('fontSizeDisplay').textContent = this.value + 'px';
        });
        document.getElementById('bubbleRadiusRange').addEventListener('input', function() {
            document.getElementById('bubbleRadiusDisplay').textContent = this.value + 'px';
        });

        // ============================================================
        //  13. 页面切换
        // ============================================================
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById('page-' + pageId);
            if (target) target.classList.add('active');
            document.querySelectorAll('.bottom-nav .nav-item').forEach(n => n.classList.remove('active'));
            const navBtn = document.querySelector(`.bottom-nav .nav-item[data-page="${pageId}"]`);
            if (navBtn) navBtn.classList.add('active');
            if (pageId === 'chat') renderMessages();
            if (pageId === 'cards') renderCardGrid(cardFilter);
            if (pageId === 'emojis') renderEmojis();
            if (pageId === 'history') renderHistory();
        }

        // ============================================================
        //  14. 数据导入导出
        // ============================================================
        function exportData() {
            const data = {
                version: '1.0',
                exportedAt: new Date().toISOString(),
                messages: state.messages,
                history: state.history,
                spread: state.spread,
                wordCards: state.wordCards,
                emojis: state.emojis,
                appearance: state.appearance,
                profile: state.profile,
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `传讯_备份_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('💾 数据已导出');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.messages && Array.isArray(data.messages)) {
                        state.messages = data.messages;
                        state.history = data.history || data.messages;
                        state.spread = data.spread || 1;
                        state.wordCards = data.wordCards || INITIAL_WORD_CARDS;
                        state.emojis = data.emojis || INITIAL_EMOJIS;
                        if (data.appearance) state.appearance = data.appearance;
                        if (data.profile) state.profile = data.profile;
                        saveState();
                        renderMessages();
                        renderHistory();
                        renderCardGrid(cardFilter);
                        renderEmojis();
                        updateUIProfiles();
                        applyAppearance();
                        showToast('📂 恢复成功！');
                    } else {
                        showToast('❌ 无效文件');
                    }
                } catch (err) {
                    showToast('❌ 读取失败');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================================
        //  15. 快速表情工具栏
        // ============================================================
        function renderQuickEmojis() {
            const bar = document.getElementById('quickEmojiBar');
            const emojis = state.emojis.slice(0, 8);
            bar.innerHTML = emojis.map(e => `<span class="quick-emoji" onclick="addEmojiToChat('${e}')">${e}</span>`).join('');
        }

        // ============================================================
        //  16. 初始化
        // ============================================================
        function init() {
            loadState();

            const a = state.appearance;
            document.documentElement.style.setProperty('--bg', a.bgColor);
            document.documentElement.style.setProperty('--chat-bg', a.chatBgColor);
            document.documentElement.style.setProperty('--bubble-user', a.userBubbleColor);
            document.documentElement.style.setProperty('--bubble-user-text', a.userTextColor);
            document.documentElement.style.setProperty('--bubble-bot', a.botBubbleColor);
            document.documentElement.style.setProperty('--bubble-bot-text', a.botTextColor);
            document.documentElement.style.setProperty('--font-size', a.fontSize + 'px');
            document.documentElement.style.setProperty('--bubble-radius', a.bubbleRadius + 'px');
            document.querySelectorAll('.page').forEach(p => p.style.background = a.chatBgColor);

            updateUIProfiles();
            updateBotStatus('online', '在线');

            document.querySelectorAll('#tarotSpread button').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#tarotSpread button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    state.spread = parseInt(this.dataset.spread);
                    saveState();
                });
                if (parseInt(btn.dataset.spread) === state.spread) btn.classList.add('active');
            });

            document.querySelectorAll('#cardFilter button').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#cardFilter button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    cardFilter = this.dataset.filter;
                    renderCardGrid(cardFilter);
                });
            });

            document.getElementById('tarotDrawBtn').addEventListener('click', function() {
                this.disabled = true;
                this.textContent = '抽牌中...';
                setTimeout(() => {
                    performTarotDraw();
                    this.disabled = false;
                    this.textContent = '✨ 抽牌';
                }, 400);
            });

            document.getElementById('sendBtn').addEventListener('click', sendUserMessage);
            document.getElementById('msgInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); sendUserMessage(); }
            });

            document.querySelectorAll('.bottom-nav .nav-item').forEach(btn => {
                btn.addEventListener('click', function() {
                    switchPage(this.dataset.page);
                });
            });

            renderMessages();
            renderCardGrid('all');
            renderEmojis();
            renderHistory();
            renderQuickEmojis();

            if (state.messages.length === 0) {
                setTimeout(() => {
                    addMessage('bot', '✨ 你好呀，你终于来了。我一直在这里等你。');
                }, 300);
            }

            console.log('✨ 传讯系统已启动（恋人模式，字卡支持多行添加）');
        }

        // 暴露全局
        window.switchPage = switchPage;
        window.sendUserMessage = sendUserMessage;
        window.addCardToChat = addCardToChat;
        window.addNewCards = addNewCards;
        window.addEmojiToChat = addEmojiToChat;
        window.openCardPicker = openCardPicker;
        window.openEmojiPicker = openEmojiPicker;
        window.addNewEmoji = addNewEmoji;
        window.deleteCard = deleteCard;
        window.deleteEmoji = deleteEmoji;
        window.viewHistoryDetail = viewHistoryDetail;
        window.clearHistory = clearHistory;
        window.clearAllChat = clearAllChat;
        window.exportData = exportData;
        window.importData = importData;
        window.showToast = showToast;
        window.openAppearance = openAppearance;
        window.closeAppearance = closeAppearance;
        window.applyAppearance = applyAppearance;
        window.editProfile = editProfile;
        window.saveProfile = saveProfile;
        window.closeProfile = closeProfile;
        window.closeModal = function() { document.getElementById('modalOverlay').classList.remove('open'); };

        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
