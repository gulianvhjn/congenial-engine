<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>✨ 梦角传讯 · 完全体</title>
    <style>
        /* ===== 全局重置 & 主题变量（动态） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f5edea;
            --chat-bg: #fdf8f6;
            --bubble-user: #d9b8b0;
            --bubble-user-text: #3d2c2c;
            --bubble-bot: #ffffff;
            --bubble-bot-text: #3d2c2c;
            --bubble-radius: 20px;
            --font-size: 14px;
            --primary: #b48b8b;
            --primary-dark: #8d6b6b;
            --shadow: 0 4px 20px rgba(120, 80, 80, 0.08);
            --radius: 20px;
            --font: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', system-ui, -apple-system, sans-serif;
            --nav-height: 62px;
            --header-height: 56px;
            --input-height: 60px;
            --status-height: 44px;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: #3d2c2c;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-size: var(--font-size);
            transition: background 0.3s;
        }

        /* ===== 顶部导航 ===== */
        .app-header {
            flex-shrink: 0;
            background: rgba(245, 237, 234, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(180, 140, 140, 0.15);
            height: var(--header-height);
            z-index: 10;
        }

        .app-header .title {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .app-header .title span {
            background: linear-gradient(135deg, #b48b8b, #8d6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .header-actions button {
            background: none;
            border: none;
            font-size: 19px;
            cursor: pointer;
            color: var(--primary-dark);
            padding: 4px 6px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .header-actions button:active {
            background: rgba(180, 140, 140, 0.15);
            transform: scale(0.88);
        }

        /* ===== 页面容器 ===== */
        .page-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .page {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            background: var(--chat-bg);
            overflow-y: auto;
            padding: 0 14px 12px;
            animation: fadeSlide 0.3s ease;
            transition: background 0.3s;
        }

        .page.active {
            display: flex;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 状态栏 ===== */
        .status-bar {
            flex-shrink: 0;
            background: rgba(255, 248, 245, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-bottom: 1px solid rgba(180, 140, 140, 0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--status-height);
            font-size: 13px;
            color: var(--text-light);
        }

        .status-bar .status-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-bar .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.8s infinite;
        }

        .status-dot.online { background: #4caf50; }
        .status-dot.thinking { background: #ff9800; }
        .status-dot.busy { background: #f44336; }
        .status-dot.away { background: #9e9e9e; }
        .status-dot.happy { background: #ffc107; }
        .status-dot.sad { background: #2196f3; }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        .status-bar .status-text {
            font-weight: 500;
            color: var(--primary-dark);
        }

        .status-bar .status-emoji {
            font-size: 18px;
            margin-right: 4px;
        }

        /* ===== 聊天页面 ===== */
        #page-chat {
            padding: 0 14px 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px 0 8px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.02);
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(180, 140, 140, 0.3);
            border-radius: 8px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeInMsg 0.3s ease;
        }

        @keyframes fadeInMsg {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.bot {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message .bubble {
            padding: 12px 16px;
            border-radius: var(--bubble-radius);
            font-size: var(--font-size);
            line-height: 1.6;
            word-break: break-word;
            box-shadow: var(--shadow);
            position: relative;
            transition: background 0.3s, color 0.3s, border-radius 0.3s;
        }

        .message.user .bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            border-bottom-right-radius: 6px;
        }

        .message.bot .bubble {
            background: var(--bubble-bot);
            color: var(--bubble-bot-text);
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(200, 170, 170, 0.15);
        }

        .message .meta {
            font-size: 11px;
            color: #a08888;
            margin-top: 4px;
            padding: 0 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .message.user .meta {
            justify-content: flex-end;
        }

        .message .bubble .tarot-badge {
            display: inline-block;
            background: rgba(180, 140, 140, 0.18);
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 11px;
            color: var(--primary-dark);
            margin-right: 6px;
        }

        .message .bubble .emoji-reaction {
            display: inline-block;
            font-size: 18px;
            margin-left: 6px;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 10px 16px;
            background: var(--bubble-bot);
            border-radius: var(--bubble-radius);
            border-bottom-left-radius: 6px;
            box-shadow: var(--shadow);
            font-size: var(--font-size);
            color: #a08888;
            gap: 4px;
            align-items: center;
            border: 1px solid rgba(200, 170, 170, 0.15);
        }

        .typing-indicator .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #b48b8b;
            border-radius: 50%;
            animation: dotBounce 1.4s infinite;
        }
        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ===== 输入区域 ===== */
        .input-wrapper {
            flex-shrink: 0;
            background: rgba(245, 237, 234, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 8px 12px 12px;
            border-top: 1px solid rgba(180, 140, 140, 0.15);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-wrapper .input-row {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #fff;
            border-radius: 30px;
            padding: 4px 6px 4px 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

            flex: 1;
            border: none;
            outline: none;
