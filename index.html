<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>传讯 · 智能体</title>
    <style>
        /* ===== 全局重置 & 变量 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f5edea;
            --chat-bg: #fdf8f6;
            --bubble-user: #d9b8b0;
            --bubble-user-text: #3d2c2c;
            --bubble-bot: #ffffff;
            --bubble-bot-text: #3d2c2c;
            --bubble-radius: 20px;
            --font-size: 14px;
            --primary: #b48b8b;
            --primary-dark: #8d6b6b;
            --shadow: 0 4px 20px rgba(120, 80, 80, 0.08);
            --radius: 20px;
            --font: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', system-ui, -apple-system, sans-serif;
            --nav-height: 62px;
            --header-height: 56px;
            --status-height: 44px;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: #3d2c2c;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-size: var(--font-size);
            transition: background 0.3s;
        }

        /* ===== 顶部导航 ===== */
        .app-header {
            flex-shrink: 0;
            background: rgba(245, 237, 234, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(180, 140, 140, 0.15);
            height: var(--header-height);
            z-index: 10;
        }

        .app-header .title {
            font-size: 17px;
            font-weight: 600;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .app-header .title span {
            background: linear-gradient(135deg, #b48b8b, #8d6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 4px;
        }

        .header-actions button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--primary-dark);
            padding: 4px 6px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .header-actions button:active {
            background: rgba(180, 140, 140, 0.15);
            transform: scale(0.88);
        }

        /* ===== 页面容器 ===== */
        .page-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .page {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            background: var(--chat-bg);
            overflow-y: auto;
            padding: 0 14px 12px;
            animation: fadeSlide 0.3s ease;
            transition: background 0.3s;
        }

        .page.active {
            display: flex;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 状态栏（含头像昵称） ===== */
        .status-bar {
            flex-shrink: 0;
            background: rgba(255, 248, 245, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-bottom: 1px solid rgba(180, 140, 140, 0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--status-height);
            font-size: 13px;
            color: var(--text-light);
            gap: 8px;
        }

        .status-bar .status-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        .status-bar .avatar-wrap {
            position: relative;
            width: 34px;
            height: 34px;
            flex-shrink: 0;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--primary);
            cursor: pointer;
            background: #e8ddd8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: 0.2s;
        }

        .status-bar .avatar-wrap:active {
            transform: scale(0.92);
        }

        .status-bar .avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-bar .avatar-wrap .avatar-emoji {
            font-size: 20px;
            line-height: 1;
        }

        .status-bar .status-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .status-bar .status-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--primary-dark);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-bar .status-name:active {
            opacity: 0.6;
        }

        .status-bar .status-sub {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #a08888;
        }

        .status-bar .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.8s infinite;
        }

        .status-dot.online {
            background: #4caf50;
        }
        .status-dot.thinking {
            background: #ff9800;
        }
        .status-dot.busy {
            background: #f44336;
        }
        .status-dot.away {
            background: #9e9e9e;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.7;
            }
        }

        .status-bar .status-emoji {
            font-size: 18px;
            flex-shrink: 0;
        }

        /* ===== 聊天页面 ===== */
        #page-chat {
            padding: 0 14px 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px 0 8px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.02);
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(180, 140, 140, 0.3);
            border-radius: 8px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 88%;
            animation: fadeInMsg 0.3s ease;
        }

        @keyframes fadeInMsg {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.bot {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message .msg-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            max-width: 100%;
        }

        .message.bot .msg-wrapper {
            flex-direction: row;
        }

        .message.user .msg-wrapper {
            flex-direction: row-reverse;
        }

        .message .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            background: #e8ddd8;
            border: 1px solid rgba(180, 140, 140, 0.2);
            overflow: hidden;
        }

        .message .msg-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message .bubble {
            padding: 10px 14px;
            border-radius: var(--bubble-radius);
            font-size: var(--font-size);
            line-height: 1.7;
            word-break: break-word;
            box-shadow: var(--shadow);
            position: relative;
            transition: background 0.3s, color 0.3s, border-radius 0.3s;
            max-width: 100%;
        }

        .message.user .bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            border-bottom-right-radius: 6px;
        }

        .message.bot .bubble {
            background: var(--bubble-bot);
            color: var(--bubble-bot-text);
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(200, 170, 170, 0.15);
        }

        .message .meta {
            font-size: 10px;
            color: #b0a0a0;
            margin-top: 3px;
            padding: 0 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .message.user .meta {
            justify-content: flex-end;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 10px 16px;
            background: var(--bubble-bot);
            border-radius: var(--bubble-radius);
            border-bottom-left-radius: 6px;
            box-shadow: var(--shadow);
            font-size: var(--font-size);
            color: #a08888;
            gap: 4px;
            align-items: center;
            border: 1px solid rgba(200, 170, 170, 0.15);
        }

        .typing-indicator .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #b48b8b;
            border-radius: 50%;
            animation: dotBounce 1.4s infinite;
        }
        .typing-indicator .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotBounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* ===== 输入区域 ===== */
        .input-wrapper {
            flex-shrink: 0;
            background: rgba(245, 237, 234, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 8px 12px 12px;
            border-top: 1px solid rgba(180, 140, 140, 0.15);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-wrapper .input-row {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #fff;
            border-radius: 30px;
            padding: 4px 6px 4px 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            font-size: var(--font-size);
            padding: 8px 0;
            background: transparent;
            font-family: var(--font);
            color: #3d2c2c;
            min-width: 0;
        }

        .input-wrapper input::placeholder {
            color: #b0a0a0;
        }

        .input-wrapper .btn-icon {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 50%;
            transition: 0.2s;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }

        .input-wrapper .btn-icon:active {
            background: rgba(180, 140, 140, 0.15);
            transform: scale(0.88);
        }

        .input-wrapper .btn-send {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 0 16px;
            height: 38px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .input-wrapper .btn-send:active {
            transform: scale(0.92);
            opacity: 0.8;
        }

        .input-toolbar {
            display: flex;
            gap: 6px;
            padding: 0 4px;
            flex-wrap: wrap;
        }

        .input-toolbar .quick-emoji {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(180, 140, 140, 0.15);
            border-radius: 30px;
            padding: 2px 12px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1.6;
        }

        .input-toolbar .quick-emoji:active {
            transform: scale(0.92);
            background: rgba(180, 140, 140, 0.15);
        }

        /* ===== 字卡库 ===== */
        #page-cards {
            padding: 12px 14px;
        }

        .page-header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .page-header-actions input[type="text"] {
            flex: 1;
            min-width: 120px;
            border: 1px solid rgba(180, 140, 140, 0.2);
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 13px;
            outline: none;
            font-family: var(--font);
            background: rgba(255, 255, 255, 0.6);
        }

        .page-header-actions select {
            border: 1px solid rgba(180, 140, 140, 0.2);
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 12px;
            outline: none;
            font-family: var(--font);
            background: rgba(255, 255, 255, 0.6);
            color: var(--text);
        }

        .page-header-actions .add-btn-small {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 12px;
            cursor: pointer;
            font-family: var(--font);
            white-space: nowrap;
        }
        .page-header-actions .add-btn-small:active {
            transform: scale(0.94);
        }

        .card-filter {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .card-filter button {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(180, 140, 140, 0.2);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #7a5e5e;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font);
        }
        .card-filter button.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .card-filter button:active {
            transform: scale(0.94);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            padding-bottom: 16px;
        }

        .card-item {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            border-radius: var(--radius-sm);
            padding: 12px 10px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
            font-size: 13px;
            line-height: 1.5;
            color: #3d2c2c;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: relative;
        }
        .card-item .tag {
            font-size: 10px;
            color: #a08888;
            background: rgba(180, 140, 140, 0.1);
            padding: 1px 10px;
            border-radius: 30px;
        }
        .card-item .card-actions {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }
        .card-item .card-actions button {
            background: rgba(180, 140, 140, 0.1);
            border: none;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 11px;
            color: var(--primary-dark);
            cursor: pointer;
            transition: 0.2s;
        }
        .card-item .card-actions button:active {
            transform: scale(0.92);
            background: rgba(180, 140, 140, 0.25);
        }
        .card-item .del-btn {
            color: #d32f2f !important;
        }

        /* ===== 表情库 ===== */
        #page-emojis {
            padding: 12px 14px;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
            gap: 8px;
            padding-bottom: 16px;
        }

        .emoji-item {
            background: rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-sm);
            padding: 10px 6px;
            text-align: center;
            font-size: 28px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .emoji-item:active {
            transform: scale(0.92);
        }
        .emoji-item .emoji-del {
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 12px;
            color: #d32f2f;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            opacity: 0;
            transition: 0.2s;
        }
        .emoji-item:hover .emoji-del {
            opacity: 1;
        }
        .emoji-item .emoji-del:active {
            transform: scale(0.85);
        }

        .emoji-add-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .emoji-add-row input {
            flex: 1;
            min-width: 100px;
            border: 1px solid rgba(180, 140, 140, 0.2);
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 14px;
            outline: none;
            font-family: var(--font);
            background: rgba(255, 255, 255, 0.6);
        }
        .emoji-add-row button {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 6px 18px;
            font-size: 13px;
            cursor: pointer;
            font-family: var(--font);
            white-space: nowrap;
        }
        .emoji-add-row button:active {
            transform: scale(0.94);
        }

        /* ===== 占卜（仅保留抽牌功能，不显示塔罗） ===== */
        #page-tarot {
            padding: 16px 14px;
            align-items: center;
            gap: 14px;
        }

        .tarot-spread {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tarot-spread button {
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid transparent;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #7a5e5e;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font);
        }
        .tarot-spread button.active {
            border-color: var(--primary);
            color: var(--primary-dark);
            background: rgba(180, 140, 140, 0.08);
        }

        .tarot-draw-btn {
            background: linear-gradient(135deg, #b48b8b, #8d6b6b);
            border: none;
            padding: 12px 40px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(180, 140, 140, 0.3);
            transition: 0.2s;
            font-family: var(--font);
        }
        .tarot-draw-btn:active {
            transform: scale(0.94);
        }

        .tarot-result {
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(6px);
            border-radius: var(--radius);
            padding: 16px 14px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .tarot-result .message-box {
            background: rgba(248, 240, 240, 0.5);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: var(--font-size);
            line-height: 1.7;
            color: #3d2c2c;
        }

        .tarot-result .action-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .tarot-result .action-row button {
            background: rgba(180, 140, 140, 0.12);
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 13px;
            color: var(--primary-dark);
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font);
        }
        .tarot-result .action-row button:active {
            transform: scale(0.94);
            background: rgba(180, 140, 140, 0.2);
        }

        /* ===== 历史 ===== */
        #page-history {
            padding: 12px 14px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 16px;
        }
        .history-item {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.2s;
        }
        .history-item:active {
            transform: scale(0.98);
        }
        .history-item .h-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #a08888;
            margin-bottom: 4px;
        }
        .history-item .h-preview {
            font-size: var(--font-size);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #3d2c2c;
        }
        .history-item .h-tag {
            display: inline-block;
            font-size: 10px;
            background: rgba(180, 140, 140, 0.1);
            padding: 2px 10px;
            border-radius: 30px;
            color: #7a5e5e;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a08888;
            font-size: 14px;
        }
        .empty-state .icon {
            font-size: 44px;
            margin-bottom: 10px;
            opacity: 0.6;
        }

        /* ===== 底部导航 ===== */
        .bottom-nav {
            flex-shrink: 0;
            background: rgba(245, 237, 234, 0.92);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(180, 140, 140, 0.15);
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: var(--nav-height);
            padding-bottom: env(safe-area-inset-bottom, 4px);
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            background: none;
            border: none;
            font-size: 10px;
            color: #a08888;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 16px;
            transition: 0.2s;
            font-family: var(--font);
            position: relative;
            min-width: 44px;
        }
        .bottom-nav .nav-item .icon {
            font-size: 20px;
            line-height: 1.2;
        }
        .bottom-nav .nav-item .label {
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .bottom-nav .nav-item.active {
            color: var(--primary-dark);
        }
        .bottom-nav .nav-item.active::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--primary);
            border-radius: 4px;
        }
        .bottom-nav .nav-item:active {
            transform: scale(0.92);
        }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-box {
            background: #fffaf8;
            border-radius: var(--radius);
            max-width: 400px;
            width: 100%;
            padding: 22px 18px 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            0% {
                transform: translateY(30px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-box .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 12px;
            text-align: center;
        }
        .modal-box .modal-body {
            font-size: 14px;
            line-height: 1.7;
            color: #3d2c2c;
        }
        .modal-box .modal-close {
            display: block;
            margin: 16px auto 0;
            background: var(--primary);
            border: none;
            padding: 10px 36px;
            border-radius: 40px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            font-family: var(--font);
            transition: 0.2s;
        }
        .modal-box .modal-close:active {
            transform: scale(0.94);
        }

        .modal-box .form-group {
            margin-bottom: 14px;
        }
        .modal-box .form-group label {
            display: block;
            font-weight: 500;
            font-size: 13px;
            color: var(--text);
            margin-bottom: 4px;
        }
        .modal-box .form-group input {
            width: 100%;
            padding: 8px 14px;
            border: 1px solid rgba(180, 140, 140, 0.2);
            border-radius: 30px;
            font-size: 14px;
            outline: none;
            font-family: var(--font);
            background: rgba(255, 255, 255, 0.6);
        }
        .modal-box .form-group input:focus {
            border-color: var(--primary);
        }

        .modal-box .avatar-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .modal-box .avatar-picker .av-option {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
            background: #f0e8e4;
        }
        .modal-box .avatar-picker .av-option.active {
            border-color: var(--primary);
            transform: scale(1.05);
            background: #e8ddd8;
        }
        .modal-box .avatar-picker .av-option:active {
            transform: scale(0.92);
        }

        /* ===== 外观设置 ===== */
        .appearance-settings {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 4px 0;
        }
        .appearance-settings .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .appearance-settings .setting-item label {
            font-weight: 500;
            color: var(--text);
            min-width: 80px;
            font-size: 14px;
        }
        .appearance-settings .setting-item input[type="color"] {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: none;
        }
        .appearance-settings .setting-item input[type="range"] {
            flex: 1;
            min-width: 100px;
            accent-color: var(--primary);
        }
        .appearance-settings .setting-item .value-display {
            font-size: 13px;
            color: var(--primary-dark);
            min-width: 30px;
            text-align: center;
        }
        .appearance-settings .preset-colors {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .appearance-settings .preset-colors .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .appearance-settings .preset-colors .color-swatch.active {
            border-color: var(--primary-dark);
            transform: scale(1.1);
        }
        .appearance-settings .preset-colors .color-swatch:active {
            transform: scale(0.9);
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(60, 44, 44, 0.88);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 400px) {
            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
            .message {
                max-width: 92%;
            }
            .input-wrapper .input-row {
                padding: 4px 6px 4px 12px;
            }
            .emoji-grid {
                grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
            }
            .status-bar .status-name {
                font-size: 13px;
            }
            .status-bar .avatar-wrap {
                width: 30px;
                height: 30px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

        function loadState() {
            try {

                if (saved) {
                    const parsed = JSON.parse(saved);
                    state.messages = parsed.messages || [];
                    state.history = parsed.history || [];
                    state.spread = parsed.spread || 1;
                    state.wordCards = parsed.wordCards || INITIAL_WORD_CARDS;
                    state.emojis = parsed.emojis || INITIAL_EMOJIS;
                    if (parsed.profile) state.profile = parsed.profile;
                    if (parsed.appearance) state.appearance = parsed.appearance;
                }
            } catch (e) {}
        }

        function saveState() {
            try {
                localStorage.setItem('tarot_rp_state', JSON.stringify({
                    messages: state.messages,
                    history: state.history,
                    spread: state.spread,
                    wordCards: state.wordCards,
                    emojis: state.emojis,
                    profile: state.profile,
                    appearance: state.appearance,
                }));
            } catch (e) {}
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getRandomItems(arr, count) {
            const shuffled = shuffleArray([...arr]);
            return shuffled.slice(0, Math.min(count, shuffled.length));
        }

        function drawTarotCards(count) {
            const shuffled = shuffleArray([...TAROT_CARDS]);
            return shuffled.slice(0, Math.min(count, shuffled.length)).map(c => ({
                ...c,
                reversed: Math.random() < 0.4,
            }));
        }

            el.textContent = msg;
            el.classList.add('show');

            toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
        }

        // 情绪匹配关键词 -> 用于调整回复风格
        const EMOTION_KEYWORDS = {
            '开心': ['高兴', '快乐', '愉悦', '欢喜', '笑', '哈哈'],
            '难过': ['伤心', '痛苦', '悲伤', '哀愁', '哭', '泪'],
            '思念': ['想念', '惦记', '牵挂', '怀念', '思'],
            '迷茫': ['困惑', '犹豫', '彷徨', '不安', '不知道'],
            '愤怒': ['生气', '恼火', '愤慨', '怒', '火大'],
            '感激': ['感谢', '感恩', '谢', '谢谢'],
            '爱': ['喜欢', '爱', '心动', '甜蜜', '温暖'],
            '孤独': ['孤单', '寂寞', '独', '一个人'],
            '疲惫': ['累', '辛苦', '疲惫', '乏力', '困'],
        };

        function detectEmotion(text) {
            let matched = '中性';
            let score = 0;
            for (const [emo, keywords] of Object.entries(EMOTION_KEYWORDS)) {
                let count = 0;
                for (const kw of keywords) {
                    if (text.includes(kw)) count++;
                }
                if (count > score) {
                    score = count;
                    matched = emo;
                }
            }
            return matched;
        }

        // 核心生成函数：基于塔罗牌 + 情绪 + 常用词库生成独特回复
        function generateSmartReply(userMessage, drawnCards) {
            const emotion = detectEmotion(userMessage);

            // 抽取塔罗牌的意象（不直接显示牌名）
            let card = null;
            if (drawnCards && drawnCards.length > 0) {
                card = drawnCards[0];
            } else {
                const allCards = shuffleArray([...TAROT_CARDS]);
                card = allCards[0];
                card.reversed = Math.random() < 0.4;
            }

            // 提取塔罗关键词和含义
            const keywords = card.keywords;
            const meaning = card.reversed ? card.reversed : card.upright;

            // 从常用词库中抽取若干短语
            const phrasePool = shuffleArray([...COMMON_PHRASES_LIBRARY]);
            const selectedPhrases = phrasePool.slice(0, 5 + Math.floor(Math.random() * 4));

            // 构建回复：组合不同部分
            let parts = [];

            // 1. 根据情绪添加开头
            const emotionOpenings = {
                '开心': ['真好呀，看到你这么开心，我也被感染了。', '你的快乐就像阳光一样温暖。', '保持这份好心情，生活也会对你微笑。'],
                '难过': ['我知道你现在很难过，但请相信，一切都会好起来的。', '难过的时候，不要一个人扛着。', '痛苦是暂时的，而你的力量是永恒的。'],
                '思念': ['思念是一种很奇妙的感觉，它让我们的心靠得更近。', '被想念是一种幸福，我也在想你。', '虽然距离遥远，但心意相通。'],
                '迷茫': ['迷茫的时候，不妨静下来听听内心的声音。', '有时候，答案就在你心里，只是需要一点时间。', '路在脚下，慢慢走总会清晰。'],
                '愤怒': ['我理解你的愤怒，但别让它控制了你。', '深呼吸，给自己一点空间冷静下来。', '生气的时候，先数到十再开口。'],
                '感激': ['你的感谢让我觉得温暖，其实能帮到你我也很开心。', '感恩是一种美德，你的善良让我感动。', '我们之间不需要这么客气，真情流露就好。'],
                '爱': ['这份感情真美好，让人心里暖暖的。', '爱是相互的，珍惜这份心意吧。', '能被你如此喜欢，是我的幸运。'],
                '孤独': ['你并不孤单，我一直在你身边。', '孤独是成长的土壤，但别忘了还有我。', '世界很大，但我们的心很近。'],
                '疲惫': ['辛苦了，记得照顾好自己。', '累了就休息一下吧，身体最重要。', '不要把自己逼得太紧，慢慢来。'],
                '中性': ['嗯，我在认真听你说。', '你说得对，我也有同感。', '原来你是这样想的，很有意思。', '继续说吧，我很愿意听。']
            };

            const openings = emotionOpenings[emotion] || emotionOpenings['中性'];
            const opening = openings[Math.floor(Math.random() * openings.length)];
            parts.push(opening);

            // 2. 融入塔罗意象（但不直接提及）
            const tarotHints = [
                `有时候，我们需要的不是答案，而是一个新的视角。`,
                `每一段旅程都有它独特的意义，就像现在这样。`,
                `相信你内心的指引，它往往比想象中更准确。`,
                `勇气不是没有恐惧，而是带着恐惧前行。`,
                `真正的力量来自内心的平静与坚定。`,
                `变化是生活的常态，拥抱它，你会发现新的可能。`,
                `倾听你的直觉，它知道什么对你最好。`,
                `每一个结束都是新的开始，别怕。`,
                `平衡是生活的艺术，找到属于你的节奏。`,
                `希望就在转角处，只要你愿意走过去。`,
            ];
            const tarotHint = tarotHints[Math.floor(Math.random() * tarotHints.length)];
            if (Math.random() < 0.7) {
                parts.push(tarotHint);
            }

            // 3. 随机插入2-3句常用短语
            const extraPhrases = selectedPhrases.slice(0, 2 + Math.floor(Math.random() * 2));
            for (const phrase of extraPhrases) {
                if (Math.random() < 0.8) {
                    parts.push(phrase);
                }
            }

            // 4. 结尾：一句总结或祝福
            const closings = [
                '愿一切安好，我会一直在这里。',
                '无论何时，都别忘了对自己温柔。',
                '你值得拥有这世间所有的美好。',
                '愿你每一步都坚定，每一天都明亮。',
                '就这样吧，记得照顾好自己。',
                '我相信你，一定可以走得很远。',
                '生活总有不期而遇的温暖，和生生不息的希望。',
                '愿你眼中有星辰，心中有山海。',
            ];
            const closing = closings[Math.floor(Math.random() * closings.length)];
            parts.push(closing);

            // 组合成完整回复，用适当的分隔
            let fullReply = parts.join(' ');
            // 确保句子之间有合理的停顿
            fullReply = fullReply.replace(/。 /g, '。\n');
            fullReply = fullReply.replace(/！ /g, '！\n');
            fullReply = fullReply.replace(/？ /g, '？\n');

            // 随机添加表情
            const emojis = ['✨', '💫', '🌙', '🌸', '🌿', '🌈', '💕', '🌟', '☀️', '🌺', '🍀', '🦋'];
            if (Math.random() < 0.5) {
                const emoji = emojis[Math.floor(Math.random() * emojis.length)];
                fullReply = emoji + ' ' + fullReply;
            }

            return fullReply.trim();
        }

        // ============================================================
        //  6. 聊天核心
        // ============================================================
        function addMessage(sender, text, extra = {}) {
            const msg = {
                id: Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                sender: sender,
                text: text,
                timestamp: Date.now(),
                ...extra,
            };
            state.messages.push(msg);
            state.history.push({ ...msg });
            saveState();
            renderMessages();
            scrollToBottom();
        }

        function sendUserMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            addMessage('user', text);
            input.value = '';
            simulateBotReply(text);
        }

        function simulateBotReply(userText) {
            const typing = document.getElementById('typingIndicator');
            typing.style.display = 'flex';
            document.getElementById('sendBtn').disabled = true;
            updateStatus('thinking', '思考中...', '🤔');

            setTimeout(() => {
                const count = state.spread;
                const cards = drawTarotCards(count);
                // 生成智能回复（隐藏塔罗牌）
                const reply = generateSmartReply(userText, cards);
                addMessage('bot', reply);
                typing.style.display = 'none';
                document.getElementById('sendBtn').disabled = false;
                updateStatus('online', '在线', '✨');
            }, 1400 + Math.random() * 1200);
        }

        function renderMessages() {
            const container = document.getElementById('chatMessages');
            if (state.messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding:60px 20px;">
                        <div class="icon">💬</div>
                        <div>开始传讯吧</div>
                        <div style="font-size:12px;margin-top:6px;">我会像朋友一样自然回应你</div>
                    </div>
                `;
                return;
            }
            let html = '';
            const profile = state.profile;
            for (const msg of state.messages) {
                const isUser = msg.sender === 'user';
                const cls = isUser ? 'user' : 'bot';
                const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const avatar = isUser ? profile.avatar : '🌙';
                const name = isUser ? profile.name : '传讯者';
                let bubbleContent = msg.text.replace(/\n/g, '<br>');

                html += `
                    <div class="message ${cls}">
                        <div class="msg-wrapper">
                            <div class="msg-avatar">${avatar}</div>
                            <div class="bubble">${bubbleContent}</div>
                        </div>
                        <div class="meta">
                            <span>${name}</span>
                            <span>${time}</span>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
        }

            const dot = document.getElementById('statusDot');

            const em = document.getElementById('statusEmoji');
            dot.className = 'status-dot ' + status;
            txt.textContent = text;
            em.textContent = emoji || '✨';

            const p = state.profile;
            document.getElementById('avatarDisplay').textContent = p.avatar;
            document.getElementById('statusName').textContent = p.name;
            // 更新所有消息中的头像（下次渲染时生效）
            renderMessages();
        }

        // ============================================================
        function openProfileEditor() {
            const overlay = document.getElementById('profileOverlay');
            overlay.classList.add('open');
            document.getElementById('profileNameInput').value = state.profile.name;

            // 渲染头像选择器
            const picker = document.getElementById('avatarPicker');
            picker.innerHTML = AVATARS.map(a => `
                <span class="av-option ${a === state.profile.avatar ? 'active' : ''}" data-avatar="${a}" onclick="selectAvatar('${a}')">${a}</span>
            `).join('');
        }

        function selectAvatar(avatar) {
            document.querySelectorAll('#avatarPicker .av-option').forEach(el => {
                el.classList.toggle('active', el.dataset.avatar === avatar);
            });
            // 暂存选中的头像
            window._selectedAvatar = avatar;
        }

        function saveProfile() {
            const nameInput = document.getElementById('profileNameInput');
            const name = nameInput.value.trim() || '传讯者';
            const avatar = window._selectedAvatar || state.profile.avatar;
            state.profile.name = name.slice(0, 12);
            state.profile.avatar = avatar;
            saveState();
            updateProfileUI();
            closeProfileEditor();
            showToast('✅ 资料已更新');
        }

        function closeProfileEditor() {
            document.getElementById('profileOverlay').classList.remove('open');
            window._selectedAvatar = null;
        }

        // ============================================================
        //  9. 字卡库
        // ============================================================
        let cardFilter = 'all';

        function renderCardGrid(filter) {
            const grid = document.getElementById('cardGrid');
            let filtered = [...state.wordCards];
            if (filter && filter !== 'all') {
                filtered = filtered.filter(w => w.tag === filter);
            }
            document.getElementById('cardCount').textContent = `共 ${filtered.length} 张`;
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">😶 没有字卡</div>`;
                return;
            }
            const shuffled = shuffleArray([...filtered]);
            grid.innerHTML = shuffled.map((w, idx) => `
                <div class="card-item">
                    <div>${w.text}</div>
                    <span class="tag">${w.tag}</span>
                    <div class="card-actions">
                        <button onclick="addCardToChat('${w.text.replace(/'/g, "\\'")}')">➕ 发送</button>
                        <button class="del-btn" onclick="deleteCard(${idx})">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function addCardToChat(text) {
            const input = document.getElementById('msgInput');
            const current = input.value;
            const cardText = `「${text}」`;
            input.value = current ? current + ' ' + cardText : cardText;
            input.focus();
            showToast('✅ 已添加字卡');
            switchPage('chat');
        }

        function addNewCard() {
            const input = document.getElementById('newCardInput');
            const tag = document.getElementById('newCardTag').value;
            const text = input.value.trim();
            if (!text) { showToast('请输入字卡内容'); return; }
            state.wordCards.push({ text, tag });
            input.value = '';
            saveState();
            renderCardGrid(cardFilter);
            showToast('✅ 字卡已添加');
        }

        function deleteCard(index) {
            if (confirm('确定删除这张字卡吗？')) {
                state.wordCards.splice(index, 1);
                saveState();
                renderCardGrid(cardFilter);
                showToast('已删除');
            }
        }

        function openCardPicker() {
            switchPage('cards');
            showToast('点击「发送」可将字卡加入输入框');
        }

        // ============================================================
        //  10. 表情库
        // ============================================================
        function renderEmojis() {
            const grid = document.getElementById('emojiGrid');
            document.getElementById('emojiCount').textContent = `共 ${state.emojis.length} 个`;
            if (state.emojis.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">😶 没有表情</div>`;
                return;
            }
            grid.innerHTML = state.emojis.map((e, idx) => `
                <div class="emoji-item" onclick="addEmojiToChat('${e}')">
                    ${e}
                    <button class="emoji-del" onclick="event.stopPropagation();deleteEmoji(${idx})">✕</button>
                </div>
            `).join('');
        }

        function addEmojiToChat(emoji) {
            const input = document.getElementById('msgInput');
            input.value = input.value + emoji;
            input.focus();
            showToast('✅ 已添加表情');
            switchPage('chat');
        }

        function addNewEmoji() {
            const input = document.getElementById('newEmojiInput');
            const emoji = input.value.trim();
            if (!emoji) { showToast('请输入表情符号'); return; }
            state.emojis.push(emoji);
            input.value = '';
            saveState();
            renderEmojis();
            showToast('✅ 表情已添加');
        }

        function deleteEmoji(index) {
            if (confirm('确定删除这个表情吗？')) {
                state.emojis.splice(index, 1);
                saveState();
                renderEmojis();
                showToast('已删除');
            }
        }

        function openEmojiPicker() {
            switchPage('emojis');
            showToast('点击表情可添加到输入框');
        }

        // ============================================================
        //  11. 占卜（隐藏塔罗牌，只输出一段话）
        // ============================================================
        function renderTarotResult(cards) {
            const container = document.getElementById('tarotResult');
            container.style.display = 'flex';

            // 使用生成器生成一段话（不显示塔罗牌）
            const dummyMessage = '请随意说点什么...';
            const generatedText = generateSmartReply(dummyMessage, cards);

            container.innerHTML = `
                <div class="message-box">${generatedText.replace(/\n/g, '<br>')}</div>
                <div class="action-row">
                    <button onclick="sendTarotToChat()">💬 发送到聊天</button>
                    <button onclick="document.getElementById('tarotResult').style.display='none'">关闭</button>
                </div>
            `;
            state.currentTarotResult = {
                cards: cards,
                message: generatedText,
            };
        }

        function sendTarotToChat() {
            if (!state.currentTarotResult) return;
            const msg = state.currentTarotResult.message;
            addMessage('bot', msg);
            document.getElementById('tarotResult').style.display = 'none';
            switchPage('chat');
            showToast('📨 已发送到聊天');
        }

        function performTarotDraw() {
            const count = state.spread;
            const cards = drawTarotCards(count);
            renderTarotResult(cards);
        }

        // ============================================================
        //  12. 历史
        // ============================================================
        function renderHistory() {
            const container = document.getElementById('historyList');
            if (state.history.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="icon">📜</div><div>还没有记录</div></div>`;
                return;
            }
            const items = state.history.slice(-20).reverse();
            container.innerHTML = items.map(h => {
                const date = new Date(h.timestamp).toLocaleString();
                const preview = h.text.length > 50 ? h.text.slice(0, 50) + '…' : h.text;
                const sender = h.sender === 'user' ? state.profile.name : '传讯者';
                return `
                    <div class="history-item" onclick="viewHistoryDetail('${h.id}')">
                        <div class="h-header"><span>${sender}</span><span>${date}</span></div>
                        <div class="h-preview">${preview}</div>
                    </div>
                `;
            }).join('');
        }

        function viewHistoryDetail(id) {
            const msg = state.history.find(m => m.id === id);
            if (!msg) return;
            const sender = msg.sender === 'user' ? state.profile.name : '传讯者';
            const body = `
                <div style="font-size:13px;color:#a08888;margin-bottom:6px;">${sender} · ${new Date(msg.timestamp).toLocaleString()}</div>
                <div style="background:rgba(248,240,240,0.5);padding:14px;border-radius:12px;font-size:var(--font-size);line-height:1.8;">
                    ${msg.text.replace(/\n/g, '<br>')}
                </div>
            `;
            document.getElementById('modalTitle').textContent = '📜 详情';
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function clearHistory() {
            if (state.history.length === 0) { showToast('没有记录'); return; }
            if (confirm('确定清空所有记录吗？')) {
                state.history = [];
                state.messages = [];
                saveState();
                renderMessages();
                renderHistory();
                showToast('已清空');
            }
        }

        function clearAllChat() {
            if (state.messages.length === 0) { showToast('聊天已空'); return; }
            if (confirm('确定清空聊天吗？（历史也会删除）')) {
                state.messages = [];
                state.history = [];
                saveState();
                renderMessages();
                renderHistory();
                showToast('已清空');
            }
        }

        // ============================================================
        //  13. 外观设置
        // ============================================================
        function openAppearance() {
            const overlay = document.getElementById('appearanceOverlay');
            overlay.classList.add('open');
            const a = state.appearance;
            document.getElementById('bgColorPicker').value = a.bgColor;
            document.getElementById('chatBgPicker').value = a.chatBgColor;
            document.getElementById('userBubbleColor').value = a.userBubbleColor;
            document.getElementById('userTextColor').value = a.userTextColor;
            document.getElementById('botBubbleColor').value = a.botBubbleColor;
            document.getElementById('botTextColor').value = a.botTextColor;
            document.getElementById('fontSizeRange').value = a.fontSize;
            document.getElementById('fontSizeDisplay').textContent = a.fontSize + 'px';
            document.getElementById('bubbleRadiusRange').value = a.bubbleRadius;
            document.getElementById('bubbleRadiusDisplay').textContent = a.bubbleRadius + 'px';
            document.querySelectorAll('#bgPresets .color-swatch').forEach(el => {
                el.classList.toggle('active', el.dataset.color === a.bgColor);
            });
            document.querySelectorAll('#chatBgPresets .color-swatch').forEach(el => {
                el.classList.toggle('active', el.dataset.color === a.chatBgColor);
            });
        }

        function closeAppearance() {
            document.getElementById('appearanceOverlay').classList.remove('open');
        }

        function applyAppearance() {
            const a = state.appearance;
            a.bgColor = document.getElementById('bgColorPicker').value;
            a.chatBgColor = document.getElementById('chatBgPicker').value;
            a.userBubbleColor = document.getElementById('userBubbleColor').value;
            a.userTextColor = document.getElementById('userTextColor').value;
            a.botBubbleColor = document.getElementById('botBubbleColor').value;
            a.botTextColor = document.getElementById('botTextColor').value;
            a.fontSize = parseInt(document.getElementById('fontSizeRange').value);
            a.bubbleRadius = parseInt(document.getElementById('bubbleRadiusRange').value);

            document.documentElement.style.setProperty('--bg', a.bgColor);
            document.documentElement.style.setProperty('--chat-bg', a.chatBgColor);
            document.documentElement.style.setProperty('--bubble-user', a.userBubbleColor);
            document.documentElement.style.setProperty('--bubble-user-text', a.userTextColor);
            document.documentElement.style.setProperty('--bubble-bot', a.botBubbleColor);
            document.documentElement.style.setProperty('--bubble-bot-text', a.botTextColor);
            document.documentElement.style.setProperty('--font-size', a.fontSize + 'px');
            document.documentElement.style.setProperty('--bubble-radius', a.bubbleRadius + 'px');

            document.querySelectorAll('.page').forEach(p => p.style.background = a.chatBgColor);
            saveState();
            showToast('✅ 外观已应用');
            closeAppearance();
        }

        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('color-swatch')) {
                const parent = e.target.closest('.preset-colors');
                const pickerId = parent.id === 'bgPresets' ? 'bgColorPicker' : 'chatBgPicker';
                const picker = document.getElementById(pickerId);
                const color = e.target.dataset.color;
                picker.value = color;
                parent.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
                e.target.classList.add('active');
                if (pickerId === 'bgColorPicker') {
                    document.documentElement.style.setProperty('--bg', color);
                } else {
                    document.documentElement.style.setProperty('--chat-bg', color);
                    document.querySelectorAll('.page').forEach(p => p.style.background = color);
                }
            }
        });

        document.getElementById('fontSizeRange').addEventListener('input', function() {
            document.getElementById('fontSizeDisplay').textContent = this.value + 'px';
        });
        document.getElementById('bubbleRadiusRange').addEventListener('input', function() {
            document.getElementById('bubbleRadiusDisplay').textContent = this.value + 'px';
        });

        // ============================================================
        //  14. 页面切换
        // ============================================================
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById('page-' + pageId);
            if (target) target.classList.add('active');
            document.querySelectorAll('.bottom-nav .nav-item').forEach(n => n.classList.remove('active'));
            const navBtn = document.querySelector(`.bottom-nav .nav-item[data-page="${pageId}"]`);
            if (navBtn) navBtn.classList.add('active');
            if (pageId === 'chat') renderMessages();
            if (pageId === 'cards') renderCardGrid(cardFilter);
            if (pageId === 'emojis') renderEmojis();
            if (pageId === 'history') renderHistory();
        }

        // ============================================================
        //  15. 数据导入导出
        // ============================================================
        function exportData() {
            const data = {
                version: '2.0',
                exportedAt: new Date().toISOString(),
                messages: state.messages,
                history: state.history,
                spread: state.spread,
                wordCards: state.wordCards,
                emojis: state.emojis,
                profile: state.profile,
                appearance: state.appearance,
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `传讯_备份_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('💾 数据已导出');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.messages && Array.isArray(data.messages)) {
                        state.messages = data.messages;
                        state.history = data.history || data.messages;
                        state.spread = data.spread || 1;
                        state.wordCards = data.wordCards || INITIAL_WORD_CARDS;
                        state.emojis = data.emojis || INITIAL_EMOJIS;
                        if (data.profile) state.profile = data.profile;
                        if (data.appearance) state.appearance = data.appearance;
                        saveState();
                        renderMessages();
                        renderHistory();
                        renderCardGrid(cardFilter);
                        renderEmojis();
                        updateProfileUI();
                        applyAppearance();
                        showToast('📂 恢复成功！');
                    } else {
                        showToast('❌ 无效文件');
                    }
                } catch (err) {
                    showToast('❌ 读取失败');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================================
        //  16. 快速表情工具栏
        // ============================================================
        function renderQuickEmojis() {
            const bar = document.getElementById('quickEmojiBar');
            const emojis = state.emojis.slice(0, 10);
            bar.innerHTML = emojis.map(e => `<span class="quick-emoji" onclick="addEmojiToChat('${e}')">${e}</span>`).join('');
        }

        // ============================================================
        //  17. 初始化
        // ============================================================
        function init() {
            loadState();

            const a = state.appearance;
            document.documentElement.style.setProperty('--bg', a.bgColor);
            document.documentElement.style.setProperty('--chat-bg', a.chatBgColor);
            document.documentElement.style.setProperty('--bubble-user', a.userBubbleColor);
            document.documentElement.style.setProperty('--bubble-user-text', a.userTextColor);
            document.documentElement.style.setProperty('--bubble-bot', a.botBubbleColor);
            document.documentElement.style.setProperty('--bubble-bot-text', a.botTextColor);
            document.documentElement.style.setProperty('--font-size', a.fontSize + 'px');
            document.documentElement.style.setProperty('--bubble-radius', a.bubbleRadius + 'px');
            document.querySelectorAll('.page').forEach(p => p.style.background = a.chatBgColor);

            // 牌阵
            document.querySelectorAll('#tarotSpread button').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#tarotSpread button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    state.spread = parseInt(this.dataset.spread);
                    saveState();
                    document.getElementById('tarotResult').style.display = 'none';
                });
                if (parseInt(btn.dataset.spread) === state.spread) btn.classList.add('active');
            });

            // 字卡筛选
            document.querySelectorAll('#cardFilter button').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#cardFilter button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    cardFilter = this.dataset.filter;
                    renderCardGrid(cardFilter);
                });
            });

            // 抽牌
            document.getElementById('tarotDrawBtn').addEventListener('click', function() {
                this.disabled = true;
                this.textContent = '抽取中...';
                setTimeout(() => {
                    performTarotDraw();
                    this.disabled = false;
                    this.textContent = '✨ 抽取';
                }, 400);
            });

            // 发送
            document.getElementById('sendBtn').addEventListener('click', sendUserMessage);
            document.getElementById('msgInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault();
                    sendUserMessage(); }
            });

            // 导航
            document.querySelectorAll('.bottom-nav .nav-item').forEach(btn => {
                btn.addEventListener('click', function() {
                    switchPage(this.dataset.page);
                });
            });

            // 渲染
            updateProfileUI();
            renderMessages();
            renderCardGrid('all');
            renderEmojis();
            renderHistory();
            renderQuickEmojis();
            updateStatus('online', '在线', '✨');

            if (state.messages.length === 0) {
                setTimeout(() => {
                    addMessage('bot', '✨ 你好呀！我是你的传讯伙伴。\n\n我们可以随意聊天，我会用最自然的方式回应你。');
                }, 500);
            }

            console.log('✨ 传讯智能体已启动');
            console.log(`📚 字卡: ${state.wordCards.length} 张，表情: ${state.emojis.length} 个，常用短语: ${COMMON_PHRASES_LIBRARY.length} 条`);
        }

        // 暴露全局
        window.switchPage = switchPage;
        window.sendUserMessage = sendUserMessage;
        window.addCardToChat = addCardToChat;
        window.addEmojiToChat = addEmojiToChat;
        window.openCardPicker = openCardPicker;
        window.openEmojiPicker = openEmojiPicker;
        window.addNewCard = addNewCard;
        window.addNewEmoji = addNewEmoji;
        window.deleteCard = deleteCard;
        window.deleteEmoji = deleteEmoji;
        window.sendTarotToChat = sendTarotToChat;
        window.viewHistoryDetail = viewHistoryDetail;
        window.clearHistory = clearHistory;
        window.clearAllChat = clearAllChat;
        window.exportData = exportData;
        window.importData = importData;
        window.showToast = showToast;
        window.openAppearance = openAppearance;
        window.closeAppearance = closeAppearance;
        window.applyAppearance = applyAppearance;
        window.openProfileEditor = openProfileEditor;
        window.closeProfileEditor = closeProfileEditor;
        window.saveProfile = saveProfile;
        window.selectAvatar = selectAvatar;
        window.closeModal = function() { document.getElementById('modalOverlay').classList.remove('open'); };

        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
